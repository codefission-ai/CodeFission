<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>clawtree</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; overflow: hidden; }

    .app {
      display: flex;
      width: 100vw;
      height: 100vh;
      background: #fff;
      color: #222;
    }

    /* Sidebar */
    .sidebar { width: 200px; border-right: 1px solid #e5e5e5; display: flex; flex-direction: column; }
    .tree-list { display: flex; flex-direction: column; height: 100%; }
    .tree-list-header { padding: 14px 16px; font-size: 15px; font-weight: 600; letter-spacing: 1px; border-bottom: 1px solid #e5e5e5; }
    .tree-list-create { display: flex; padding: 8px; gap: 4px; }
    .tree-list-create input {
      flex: 1; padding: 6px 8px; border: 1px solid #ddd; border-radius: 4px;
      font-size: 13px; outline: none; background: #fafafa;
    }
    .tree-list-create input:focus { border-color: #999; }
    .tree-list-create button {
      padding: 6px 12px; background: #222; color: #fff; border: none;
      border-radius: 4px; cursor: pointer; font-size: 14px; font-weight: 600;
    }
    .tree-list-items { flex: 1; overflow-y: auto; }
    .tree-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 12px; cursor: pointer; font-size: 13px;
      border-bottom: 1px solid #f0f0f0;
    }
    .tree-item:hover { background: #f5f5f5; }
    .tree-item.active { background: #f0f0f0; font-weight: 500; }
    .delete-btn { background: none; border: none; color: #aaa; cursor: pointer; font-size: 14px; }
    .delete-btn:hover { color: #e00; }

    /* Canvas */
    .canvas { flex: 1; min-width: 0; border-right: 1px solid #e5e5e5; }
    .canvas-empty {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 100%; color: #999; gap: 8px;
    }
    .logo { font-size: 28px; font-weight: 600; letter-spacing: 2px; color: #222; }

    /* React Flow nodes */
    .tree-node {
      background: #fff; border: 1.5px solid #ddd; border-radius: 6px;
      padding: 6px 14px; cursor: pointer; display: flex; align-items: center;
      gap: 6px; font-size: 12px; min-width: 80px; max-width: 180px;
    }
    .tree-node.selected { border-color: #222; background: #f8f8f8; }
    .tree-node-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .tree-node-label { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .react-flow__handle { width: 6px !important; height: 6px !important; background: #ccc !important; border: none !important; }

    /* Chat panel */
    .chat { width: 360px; display: flex; flex-direction: column; }
    .chat-empty {
      display: flex; align-items: center; justify-content: center;
      height: 100%; color: #aaa; font-size: 13px;
    }
    .chat-panel { display: flex; flex-direction: column; height: 100%; }
    .chat-header {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 14px; border-bottom: 1px solid #e5e5e5; flex-shrink: 0;
    }
    .chat-title { font-size: 13px; font-weight: 500; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .chat-streaming { font-size: 11px; color: #22c55e; }
    .branch-btn {
      padding: 3px 10px; font-size: 11px; border: 1px solid #ddd;
      background: #fff; border-radius: 4px; cursor: pointer; color: #555;
    }
    .branch-btn:hover { background: #f5f5f5; border-color: #bbb; }

    .chat-messages { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 10px; }
    .chat-placeholder { color: #aaa; font-size: 13px; text-align: center; padding: 40px 0; }

    .msg { max-width: 90%; font-size: 13px; line-height: 1.5; }
    .msg.user { align-self: flex-end; }
    .msg.assistant { align-self: flex-start; }
    .msg-role { font-size: 10px; color: #999; margin-bottom: 2px; font-weight: 500; }
    .msg-from { color: #bbb; font-weight: 400; }
    .msg.user .msg-text { background: #f0f0f0; padding: 8px 10px; border-radius: 8px 8px 2px 8px; }
    .msg.assistant .msg-text {
      background: #fafafa; border: 1px solid #eee;
      padding: 8px 10px; border-radius: 8px 8px 8px 2px; white-space: pre-wrap; word-break: break-word;
    }

    .chat-input { display: flex; gap: 6px; padding: 10px 12px; border-top: 1px solid #e5e5e5; flex-shrink: 0; }
    .chat-input textarea {
      flex: 1; padding: 8px; border: 1px solid #ddd; border-radius: 6px;
      font-size: 13px; resize: none; outline: none; font-family: inherit; background: #fafafa;
    }
    .chat-input textarea:focus { border-color: #999; }
    .chat-input button {
      padding: 8px 16px; background: #222; color: #fff; border: none;
      border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; align-self: flex-end;
    }
    .chat-input button:disabled { opacity: 0.4; cursor: default; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
