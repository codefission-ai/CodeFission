<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RepoEvolve</title>
  <style>
    /* ── Design tokens (adapted from WhatTheBot) ──────────────── */
    :root {
      --bg-deep: #ffffff;
      --bg-surface: #f3f3f5;
      --bg-raised: #eaeaed;
      --bg-hover: #e0e0e5;
      --bg-active: #d6d6dd;

      --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
      --shadow-md: 0 2px 8px rgba(0,0,0,0.08);
      --shadow-lg: 0 8px 30px rgba(0,0,0,0.10);

      --border-subtle: rgba(0,0,0,0.04);
      --border-dim: rgba(0,0,0,0.08);
      --border-visible: rgba(0,0,0,0.14);

      --text-primary: #1a1a1e;
      --text-secondary: #4a4a54;
      --text-muted: #8a8a96;
      --text-dim: #b0b0ba;

      --accent: #3a3a42;
      --accent-dim: rgba(0,0,0,0.05);
      --accent-glow: rgba(0,0,0,0.03);

      --green: #16a34a;
      --green-dim: rgba(22,163,74,0.10);
      --red: #dc2626;
      --red-dim: rgba(220,38,38,0.10);
      --amber: #d97706;
      --amber-dim: rgba(217,119,6,0.08);

      --radius-sm: 6px;
      --radius-md: 10px;

      --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, system-ui, sans-serif;
      --font-mono: "SF Mono", "Fira Code", "Cascadia Code", "JetBrains Mono", Menlo, monospace;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font-sans);
      font-size: 13px;
      line-height: 1.55;
      background: var(--bg-deep);
      color: var(--text-secondary);
      overflow: hidden;
    }

    /* ── Scrollbar ──────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.10); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.18); }

    /* ── Layout ─────────────────────────────────────────────────── */
    .app {
      display: flex;
      width: 100vw;
      height: 100vh;
      background: var(--bg-deep);
      color: var(--text-secondary);
    }

    /* ── Resize handle ──────────────────────────────────────────── */
    .resize-handle {
      width: 4px;
      cursor: col-resize;
      background: transparent;
      transition: background 0.15s;
      flex-shrink: 0;
      z-index: 10;
    }
    .resize-handle:hover,
    .resize-handle.dragging {
      background: var(--accent);
    }

    /* ── Sidebar ────────────────────────────────────────────────── */
    .sidebar {
      width: 220px;
      min-width: 0;
      background: var(--bg-surface);
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border-dim);
      box-shadow: var(--shadow-md);
      overflow: hidden;
    }
    .sidebar.collapsed {
      width: 0 !important;
      min-width: 0;
      border-right: none;
      overflow: hidden;
    }
    .tree-list { display: flex; flex-direction: column; height: 100%; }
    .tree-list-header {
      padding: 14px 16px;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.5px;
      color: var(--text-primary);
      border-bottom: 1px solid var(--border-dim);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .tree-list-create { display: flex; padding: 8px; gap: 4px; }
    .tree-list-create input {
      flex: 1; padding: 6px 10px;
      border: 1px solid var(--border-dim);
      border-radius: var(--radius-sm);
      font-size: 12px; outline: none;
      background: var(--bg-raised);
      color: var(--text-primary);
      font-family: var(--font-sans);
    }
    .tree-list-create input::placeholder { color: var(--text-muted); }
    .tree-list-create input:focus { border-color: var(--accent); }
    .tree-list-create button {
      padding: 6px 12px; background: var(--accent); color: #fff; border: none;
      border-radius: var(--radius-sm); cursor: pointer; font-size: 13px; font-weight: 600;
    }
    .tree-list-create button:hover { filter: brightness(1.1); }
    .tree-list-items { flex: 1; overflow-y: auto; padding: 4px 0; }
    .tree-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 16px; cursor: pointer; font-size: 12px;
      color: var(--text-secondary);
      transition: background 0.1s;
    }
    .tree-item:hover { background: var(--bg-hover); }
    .tree-item.active {
      background: var(--bg-active);
      color: var(--text-primary);
      font-weight: 500;
      border-left: 2px solid var(--accent);
    }
    .delete-btn {
      background: none; border: none; color: var(--text-muted);
      cursor: pointer; font-size: 14px; opacity: 0;
      transition: opacity 0.1s, color 0.1s;
    }
    .tree-item:hover .delete-btn { opacity: 1; }
    .delete-btn:hover { color: var(--red); }

    /* ── Canvas ─────────────────────────────────────────────────── */
    .canvas {
      flex: 1;
      min-width: 0;
      background: var(--bg-deep);
    }
    .canvas-empty {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 100%; color: var(--text-dim); gap: 6px;
    }
    .empty-icon { color: var(--text-dim); margin-bottom: 8px; }
    .logo { font-size: 22px; font-weight: 700; letter-spacing: 1px; color: var(--text-primary); }
    .empty-sub { font-size: 13px; color: var(--text-muted); max-width: 280px; text-align: center; line-height: 1.5; }

    /* React Flow overrides for dark theme */
    .react-flow__background { background: var(--bg-deep) !important; }
    .tree-node {
      background: var(--bg-raised); border: 1px solid var(--border-dim); border-radius: var(--radius-sm);
      padding: 6px 14px; cursor: pointer; display: flex; align-items: center;
      flex-direction: row;
      gap: 6px; font-size: 11px; min-width: 80px; max-width: 180px;
      color: var(--text-secondary);
      box-shadow: var(--shadow-sm);
      transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
    }
    .tree-node.tree-node-root {
      flex-direction: column;
      align-items: stretch;
      min-width: 240px; max-width: 360px;
      padding: 8px 10px;
      cursor: default;
    }
    .tree-node:hover { background: var(--bg-hover); border-color: var(--text-muted); box-shadow: var(--shadow-md); }
    .tree-node.selected { border-color: var(--accent); background: var(--accent-dim); color: var(--text-primary); }
    .tree-node-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .tree-node-label { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* Root node */
    .tree-node.tree-node-root:hover { background: var(--bg-raised); border-color: var(--border-visible); }
    .tree-node-root-active {
      flex-direction: column;
      align-items: stretch;
      max-height: 300px;
      overflow-y: auto;
    }
    .tree-node-root-input {
      min-width: 0; width: 100%;
      padding: 6px 10px; font-size: 12px;
      font-family: var(--font-mono);
      background: var(--bg-surface);
      color: var(--text-primary);
      border: 1px solid var(--border-dim);
      border-radius: 4px; outline: none;
      resize: none; line-height: 1.4;
      overflow: hidden;
      min-height: 28px; max-height: 200px;
    }
    .tree-node-root-input::placeholder { color: var(--text-muted); }
    .tree-node-root-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent-glow);
    }
    .stream-cursor {
      display: inline-block;
      width: 6px; height: 12px;
      background: var(--accent);
      margin-left: 2px;
      animation: cursor-blink 0.8s infinite;
      vertical-align: text-bottom;
    }
    @keyframes cursor-blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    .tree-node.expanded {
      max-width: 420px;
      flex-direction: column;
      align-items: flex-start;
      padding: 8px 14px;
    }
    .tree-node.expanded .tree-node-label { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; }
    .tree-node-preview {
      display: flex;
      flex-direction: column;
      gap: 6px;
      width: 100%;
      margin-top: 6px;
      font-size: 11px;
      line-height: 1.4;
    }
    .tree-node-user {
      background: var(--bg-active);
      padding: 4px 8px;
      border-radius: 4px;
      color: var(--text-primary);
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 55px;
      overflow: hidden;
    }
    .tree-node-user { position: relative; }
    .collapse-btn {
      position: absolute; top: 3px; right: 3px;
      width: 16px; height: 16px;
      background: none; border: 1px solid transparent; border-radius: 3px;
      color: var(--text-muted); font-size: 8px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity 0.15s, background 0.1s, border-color 0.1s;
    }
    .tree-node-user:hover .collapse-btn { opacity: 1; }
    .collapse-btn:hover {
      background: var(--bg-hover); border-color: var(--border-dim);
      color: var(--text-primary);
    }
    .tree-node-assistant {
      padding: 4px 8px;
      border-left: 2px solid var(--accent);
      color: var(--text-secondary);
      word-break: break-word;
      max-height: 300px;
      overflow-y: auto;
      width: 100%;
    }
    .tree-node-input {
      display: flex;
      gap: 4px;
      margin-top: 4px;
      width: 100%;
    }
    .tree-node-textarea {
      flex: 1;
      padding: 4px 8px;
      border: 1px solid var(--border-dim);
      border-radius: 4px;
      font-size: 11px;
      font-family: var(--font-mono);
      background: var(--bg-surface);
      color: var(--text-primary);
      resize: none;
      outline: none;
      line-height: 1.4;
      min-height: 24px; max-height: 150px;
      overflow: hidden;
    }
    .tree-node-textarea::placeholder { color: var(--text-muted); }
    .tree-node-textarea:focus { border-color: var(--accent); }
    .tree-node-send {
      padding: 4px 8px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 10px;
      font-weight: 600;
      align-self: flex-end;
    }
    .tree-node-send:hover { filter: brightness(1.15); }
    .tree-node-send:disabled { opacity: 0.3; cursor: default; filter: none; }
    .react-flow__handle { width: 6px !important; height: 6px !important; background: var(--text-muted) !important; border: none !important; }
    .react-flow__edge path { stroke: var(--border-visible) !important; }

    /* ── Zoom controls ─────────────────────────────────────────── */
    .zoom-controls {
      position: absolute; bottom: 12px; right: 12px; z-index: 5;
      display: flex; gap: 2px;
    }
    .zoom-controls button {
      width: 28px; height: 28px;
      background: var(--bg-raised); border: 1px solid var(--border-dim);
      border-radius: var(--radius-sm); cursor: pointer;
      color: var(--text-secondary); font-size: 14px; font-weight: 600;
      display: flex; align-items: center; justify-content: center;
      box-shadow: var(--shadow-sm); transition: all 0.1s;
    }
    .zoom-controls button:hover {
      background: var(--bg-hover); color: var(--text-primary);
      border-color: var(--border-visible);
    }

    /* ── Chat panel ─────────────────────────────────────────────── */
    .chat {
      width: 380px;
      min-width: 0;
      display: flex;
      flex-direction: column;
      background: var(--bg-deep);
      border-left: 1px solid var(--border-dim);
      box-shadow: var(--shadow-md);
      overflow: hidden;
    }
    .chat.collapsed {
      width: 0 !important;
      min-width: 0;
      border-left: none;
      overflow: hidden;
    }
    .chat-empty {
      display: flex; align-items: center; justify-content: center;
      height: 100%; color: var(--text-muted); font-size: 13px;
    }
    .chat-panel { display: flex; flex-direction: column; height: 100%; }
    .chat-header {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 16px; border-bottom: 1px solid var(--border-dim); flex-shrink: 0;
      min-height: 40px;
    }
    .chat-title {
      font-size: 13px; font-weight: 600; flex: 1;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      color: var(--text-primary);
    }
    .chat-streaming {
      font-size: 11px; color: var(--green);
      animation: pulse-dot 1.2s infinite;
    }
    .branch-btn {
      padding: 3px 10px; font-size: 11px;
      border: 1px solid var(--border-visible);
      background: transparent; border-radius: var(--radius-sm);
      cursor: pointer; color: var(--text-secondary);
      transition: all 0.15s;
    }
    .branch-btn:hover { background: var(--accent-dim); border-color: var(--accent); color: var(--text-primary); }

    /* ── Messages ───────────────────────────────────────────────── */
    .chat-messages {
      flex: 1; overflow-y: auto; padding: 16px;
      display: flex; flex-direction: column; gap: 6px;
    }
    .chat-placeholder { color: var(--text-muted); font-size: 13px; text-align: center; padding: 40px 0; }

    .msg { max-width: 90%; font-size: 13px; line-height: 1.55; animation: msg-in 200ms ease-out; }
    .msg.user { align-self: flex-end; }
    .msg.assistant { align-self: flex-start; width: 100%; }

    .msg-role {
      font-size: 10px; margin-bottom: 3px; font-weight: 600;
      display: flex; align-items: center; gap: 4px;
    }
    .msg.user .msg-role { color: var(--text-muted); justify-content: flex-end; }
    .msg.assistant .msg-role { color: var(--accent); }
    .msg-from { color: var(--text-dim); font-weight: 400; font-size: 10px; }

    .msg.user .msg-text {
      background: var(--bg-raised); padding: 8px 12px;
      border-radius: 10px 10px 2px 10px;
      color: var(--text-primary);
      box-shadow: var(--shadow-sm);
      white-space: pre-wrap; word-break: break-word;
    }

    .msg.assistant .msg-text {
      padding: 4px 0; color: var(--text-secondary);
      white-space: normal; word-break: break-word;
    }

    /* ── Markdown inside bot messages ───────────────────────────── */
    .msg.assistant .msg-text p { margin: 0 0 8px 0; }
    .msg.assistant .msg-text p:last-child { margin-bottom: 0; }
    .msg.assistant .msg-text code {
      padding: 2px 6px; background: var(--bg-raised); border-radius: 4px;
      font-family: var(--font-mono); font-size: 12px;
      border: 1px solid var(--border-subtle);
    }
    .msg.assistant .msg-text pre {
      background: var(--bg-surface); padding: 12px 14px; border-radius: var(--radius-sm);
      overflow-x: auto; margin: 8px 0; border: 1px solid var(--border-dim);
      box-shadow: inset 0 1px 3px rgba(0,0,0,0.04);
    }
    .msg.assistant .msg-text pre code {
      padding: 0; background: none; border: none; font-size: 12px; line-height: 1.5;
    }
    .msg.assistant .msg-text blockquote {
      border-left: 3px solid var(--accent-dim); padding-left: 14px;
      color: var(--text-muted); margin: 8px 0;
    }
    .msg.assistant .msg-text ul, .msg.assistant .msg-text ol { padding-left: 20px; margin: 4px 0 8px; }
    .msg.assistant .msg-text h1, .msg.assistant .msg-text h2, .msg.assistant .msg-text h3 {
      color: var(--text-primary); margin: 12px 0 6px 0;
    }
    .msg.assistant .msg-text h1 { font-size: 16px; }
    .msg.assistant .msg-text h2 { font-size: 14px; }
    .msg.assistant .msg-text h3 { font-size: 13px; }
    .msg.assistant .msg-text a { color: var(--accent); text-decoration: underline; }
    .msg.assistant .msg-text a:hover { text-decoration: none; }
    .msg.assistant .msg-text table { border-collapse: collapse; margin: 8px 0; width: 100%; }
    .msg.assistant .msg-text th, .msg.assistant .msg-text td {
      padding: 4px 10px; border: 1px solid var(--border-dim); font-size: 12px;
    }
    .msg.assistant .msg-text th { background: var(--bg-raised); color: var(--text-primary); font-weight: 600; }
    .msg.assistant .msg-text img { max-width: 100%; border-radius: 4px; }
    .msg.assistant .msg-text hr { border: none; border-top: 1px solid var(--border-dim); margin: 12px 0; }

    /* ── Tool calls (adapted from WhatTheBot) ──────────────────── */
    .tool-calls-block {
      display: flex; flex-direction: column; gap: 2px;
      padding: 4px 0; animation: msg-in 200ms ease-out;
    }

    .tool-line {
      display: flex; align-items: center; gap: 6px;
      font-family: var(--font-mono); font-size: 11px;
      padding: 3px 0 3px 10px; border-left: 2px solid var(--text-muted);
      flex-wrap: wrap;
    }
    .tool-line.terminal { border-left-color: var(--green); }
    .tool-line.file     { border-left-color: var(--accent); }
    .tool-line.search   { border-left-color: var(--amber); }
    .tool-line.running  { border-left-color: var(--amber); }
    .tool-line.error    { border-left-color: var(--red); }

    .tool-line-label {
      font-size: 10px; color: var(--text-muted); min-width: 32px;
      font-weight: 600; text-transform: uppercase;
    }
    .tool-line.terminal .tool-line-label { color: var(--green); min-width: auto; }

    .tool-line-value {
      flex: 1; color: var(--text-secondary);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      min-width: 0;
    }
    .tool-line.terminal .tool-line-value { color: var(--green); }
    .tool-line.error .tool-line-value { color: var(--text-muted); }

    .tool-line-status {
      font-size: 11px; font-weight: 600; flex-shrink: 0;
    }
    .tool-line-status.done    { color: var(--green); }
    .tool-line-status.error   { color: var(--red); }
    .tool-line-status.running { color: var(--amber); animation: spin-icon 1s linear infinite; display: inline-block; }

    @keyframes spin-icon {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .tool-line-details {
      width: 100%; padding-left: 10px;
    }
    .tool-line-toggle {
      font-size: 10px; font-family: var(--font-mono); color: var(--text-dim);
      background: none; border: none; cursor: pointer; padding: 2px 0;
    }
    .tool-line-toggle:hover { color: var(--text-secondary); }
    .tool-line-body {
      font-family: var(--font-mono); font-size: 11px;
      padding: 6px 10px; margin: 2px 0;
      background: var(--bg-surface); border: 1px solid var(--border-dim);
      border-radius: 4px; max-height: 200px; overflow-y: auto;
      white-space: pre-wrap; word-break: break-all;
      color: var(--text-secondary);
    }
    .tool-line-body.error { color: var(--red); border-color: rgba(220,38,38,0.2); }

    .tool-generic {
      font-family: var(--font-mono); font-size: 11px;
      border-left: 2px solid var(--text-muted); padding-left: 10px;
      margin: 2px 0;
    }
    .tool-generic.running { border-left-color: var(--amber); }
    .tool-generic.done    { border-left-color: var(--text-muted); }
    .tool-generic.error   { border-left-color: var(--red); }

    .tool-generic-summary {
      cursor: pointer; display: flex; align-items: center; gap: 6px;
      padding: 2px 0; list-style: none;
    }
    .tool-generic-summary::-webkit-details-marker { display: none; }

    .tool-generic-name { color: var(--text-primary); font-weight: 600; }
    .tool-generic-args {
      color: var(--text-dim); flex: 1; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap;
    }
    .tool-generic-body {
      font-family: var(--font-mono); font-size: 11px;
      padding: 6px 10px; margin: 4px 0;
      background: var(--bg-surface); border: 1px solid var(--border-dim);
      border-radius: 4px; max-height: 200px; overflow-y: auto;
      white-space: pre-wrap; word-break: break-all;
      color: var(--text-secondary);
    }
    .tool-generic-body.error { color: var(--red); border-color: rgba(220,38,38,0.2); }

    /* ── Streaming dots ─────────────────────────────────────────── */
    .stream-dots {
      font-size: 18px; letter-spacing: 3px; color: var(--text-muted);
      animation: dots-pulse 1.4s infinite;
      padding: 4px 0;
    }

    /* ── Chat input ─────────────────────────────────────────────── */
    .chat-input {
      display: flex; gap: 6px; padding: 12px 16px;
      border-top: 1px solid var(--border-dim); flex-shrink: 0;
      align-items: flex-end;
    }
    .chat-input textarea {
      flex: 1; padding: 8px 12px;
      border: 1px solid var(--border-dim);
      border-radius: var(--radius-sm);
      font-size: 13px; resize: none; outline: none;
      font-family: var(--font-mono);
      background: var(--bg-raised);
      color: var(--text-primary);
      line-height: 1.5;
      min-height: 38px; max-height: 160px;
      field-sizing: content;
      transition: border-color 0.15s;
    }
    .chat-input textarea::placeholder { color: var(--text-muted); }
    .chat-input textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    .chat-input button {
      padding: 8px 16px; background: var(--accent); color: #fff; border: none;
      border-radius: var(--radius-sm); cursor: pointer; font-size: 12px;
      font-weight: 600; align-self: flex-end;
      transition: filter 0.15s;
    }
    .chat-input button:hover { filter: brightness(1.15); }
    .chat-input button:disabled { opacity: 0.3; cursor: default; filter: none; }

    /* ── Toggle buttons (collapse panels) ───────────────────────── */
    .panel-toggle {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      z-index: 100;
      width: 16px;
      height: 40px;
      background: var(--bg-raised);
      border: 1px solid var(--border-dim);
      box-shadow: var(--shadow-sm);
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      transition: all 0.15s;
    }
    .panel-toggle:hover { background: var(--bg-hover); color: var(--text-secondary); border-color: var(--border-visible); }
    .panel-toggle.left { left: 0; border-radius: 0 4px 4px 0; border-left: none; }
    .panel-toggle.right { right: 0; border-radius: 4px 0 0 4px; border-right: none; }

    /* ── Animations ─────────────────────────────────────────────── */
    @keyframes msg-in {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    @keyframes dots-pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }

    /* ── Clickable assistant response in tree node ──────────────── */
    .tree-node-assistant.clickable {
      cursor: pointer;
      border-radius: 4px;
      transition: background 0.15s, border-color 0.15s;
    }
    .tree-node-assistant.clickable:hover {
      background: var(--bg-hover);
      border-left-color: var(--accent);
    }
    .tree-node.selected .tree-node-assistant.clickable:hover {
      background: var(--bg-active);
    }

    /* ── Markdown inside tree node ─────────────────────────────── */
    .tree-node-response-md { font-size: 11px; line-height: 1.5; }
    .tree-node-response-md p { margin: 0 0 6px 0; }
    .tree-node-response-md p:last-child { margin-bottom: 0; }
    .tree-node-response-md code {
      padding: 1px 4px; background: var(--bg-active); border-radius: 3px;
      font-family: var(--font-mono); font-size: 10px;
      border: 1px solid var(--border-subtle);
    }
    .tree-node-response-md pre {
      background: var(--bg-deep); padding: 8px 10px;
      border-radius: 4px; overflow-x: auto;
      margin: 4px 0; border: 1px solid var(--border-dim);
    }
    .tree-node-response-md pre code {
      padding: 0; background: none; border: none; font-size: 10px; line-height: 1.4;
    }
    .tree-node-response-md blockquote {
      border-left: 2px solid var(--accent-dim); padding-left: 8px;
      color: var(--text-muted); margin: 4px 0;
    }
    .tree-node-response-md ul, .tree-node-response-md ol { padding-left: 16px; margin: 4px 0; }
    .tree-node-response-md h1, .tree-node-response-md h2, .tree-node-response-md h3 {
      color: var(--text-primary); margin: 8px 0 4px 0;
    }
    .tree-node-response-md h1 { font-size: 14px; }
    .tree-node-response-md h2 { font-size: 13px; }
    .tree-node-response-md h3 { font-size: 12px; }
    .tree-node-response-md a { color: var(--accent); text-decoration: underline; }
    .tree-node-response-md a:hover { text-decoration: none; }
    .tree-node-response-md table { border-collapse: collapse; margin: 4px 0; width: 100%; }
    .tree-node-response-md th, .tree-node-response-md td {
      padding: 3px 8px; border: 1px solid var(--border-dim); font-size: 10px;
    }
    .tree-node-response-md th { background: var(--bg-raised); color: var(--text-primary); font-weight: 600; }
    .tree-node-response-md img { max-width: 100%; border-radius: 3px; }
    .tree-node-response-md video { max-width: 100%; border-radius: 3px; margin: 4px 0; }
    .tree-node-response-md .video-embed { position: relative; padding-bottom: 56.25%; height: 0; margin: 4px 0; border-radius: 3px; overflow: hidden; }
    .tree-node-response-md .video-embed iframe { position: absolute; inset: 0; width: 100%; height: 100%; }
    .tree-node-response-md hr { border: none; border-top: 1px solid var(--border-dim); margin: 8px 0; }

    /* ── Node response modal ─────────────────────────────────────── */
    .node-modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(0,0,0,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: modal-fade-in 150ms ease-out;
    }
    @keyframes modal-fade-in {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .node-modal {
      position: relative;
      background: var(--bg-surface);
      border: 1px solid var(--border-visible);
      border-radius: var(--radius-md);
      width: 90vw; max-width: 720px;
      max-height: 80vh;
      overflow-y: auto;
      padding: 24px 28px;
      box-shadow: var(--shadow-lg);
    }
    .node-modal-close {
      position: absolute; top: 10px; right: 14px;
      background: none; border: none; color: var(--text-muted);
      font-size: 22px; cursor: pointer; line-height: 1;
    }
    .node-modal-close:hover { color: var(--text-primary); }
    .node-modal-user {
      background: var(--bg-active);
      padding: 8px 12px; border-radius: var(--radius-sm);
      color: var(--text-primary); font-size: 13px;
      margin-bottom: 16px; white-space: pre-wrap; word-break: break-word;
    }
    .node-modal-response {
      color: var(--text-secondary);
      font-size: 14px; line-height: 1.7;
    }
    .node-modal-response p { margin: 0 0 10px 0; }
    .node-modal-response p:last-child { margin-bottom: 0; }
    .node-modal-response code {
      padding: 2px 6px; background: var(--bg-raised); border-radius: 4px;
      font-family: var(--font-mono); font-size: 13px;
      border: 1px solid var(--border-subtle);
    }
    .node-modal-response pre {
      background: var(--bg-deep); padding: 14px 16px;
      border-radius: var(--radius-sm); overflow-x: auto;
      margin: 10px 0; border: 1px solid var(--border-dim);
    }
    .node-modal-response pre code {
      padding: 0; background: none; border: none; font-size: 13px; line-height: 1.5;
    }
    .node-modal-response blockquote {
      border-left: 3px solid var(--accent-dim); padding-left: 14px;
      color: var(--text-muted); margin: 10px 0;
    }
    .node-modal-response ul, .node-modal-response ol { padding-left: 22px; margin: 6px 0 10px; }
    .node-modal-response h1, .node-modal-response h2, .node-modal-response h3 {
      color: var(--text-primary); margin: 16px 0 8px 0;
    }
    .node-modal-response h1 { font-size: 18px; }
    .node-modal-response h2 { font-size: 16px; }
    .node-modal-response h3 { font-size: 14px; }
    .node-modal-response a { color: var(--accent); text-decoration: underline; }
    .node-modal-response a:hover { text-decoration: none; }
    .node-modal-response table { border-collapse: collapse; margin: 10px 0; width: 100%; }
    .node-modal-response th, .node-modal-response td {
      padding: 6px 12px; border: 1px solid var(--border-dim); font-size: 13px;
    }
    .node-modal-response th { background: var(--bg-raised); color: var(--text-primary); font-weight: 600; }
    .node-modal-response img { max-width: 100%; border-radius: 4px; }
    .node-modal-response video { max-width: 100%; border-radius: 4px; margin: 10px 0; }
    .node-modal-response .video-embed { position: relative; padding-bottom: 56.25%; height: 0; margin: 10px 0; border-radius: 4px; overflow: hidden; }
    .node-modal-response .video-embed iframe { position: absolute; inset: 0; width: 100%; height: 100%; }
    .node-modal-response hr { border: none; border-top: 1px solid var(--border-dim); margin: 14px 0; }

    /* KaTeX overrides for dark theme */
    .katex { color: var(--text-primary); }
    .katex-display { margin: 12px 0; overflow-x: auto; }

    /* ── Repo selector (inline in root node) ──────────────────── */
    .repo-selector {
      display: flex; flex-direction: column; gap: 4px;
      width: 100%; margin-bottom: 4px;
    }
    .repo-selector-row {
      display: flex; gap: 4px; align-items: center;
    }
    .repo-selector-select {
      flex: 1; padding: 3px 6px; font-size: 10px;
      background: var(--bg-surface); color: var(--text-secondary);
      border: 1px solid var(--border-dim); border-radius: 4px;
      outline: none; cursor: pointer;
      font-family: var(--font-sans);
    }
    .repo-selector-select:focus { border-color: var(--accent); }
    .repo-selector-input {
      width: 100%; padding: 4px 8px; font-size: 11px;
      background: var(--bg-surface); color: var(--text-primary);
      border: 1px solid var(--border-dim); border-radius: 4px;
      outline: none; font-family: var(--font-mono);
    }
    .repo-selector-input::placeholder { color: var(--text-muted); }
    .repo-selector-input:focus { border-color: var(--accent); }
    .repo-selector-btn {
      padding: 3px 10px; font-size: 10px; font-weight: 600;
      background: var(--accent); color: #fff; border: none;
      border-radius: 4px; cursor: pointer; white-space: nowrap;
    }
    .repo-selector-btn:hover { filter: brightness(1.15); }
    .repo-selector-btn:disabled { opacity: 0.4; cursor: default; }
    .repo-selector-hint {
      font-size: 9px; color: var(--amber); padding: 0 2px;
    }
    .repo-badge {
      display: flex; align-items: center; gap: 4px;
      font-size: 10px; padding: 2px 6px 2px 8px;
      background: var(--accent-dim); color: var(--accent);
      border-radius: 4px; border: 1px solid rgba(0,0,0,0.08);
      width: 100%; margin-bottom: 4px;
      font-family: var(--font-mono);
    }
    .repo-badge-text {
      flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .repo-badge-copy {
      background: none; border: none; color: var(--accent);
      cursor: pointer; font-size: 9px; font-family: var(--font-mono);
      padding: 1px 4px; border-radius: 3px; flex-shrink: 0;
      opacity: 0.6; transition: opacity 0.15s;
    }
    .repo-badge-copy:hover { opacity: 1; background: rgba(0,0,0,0.06); }
    .repo-badge-browsable { cursor: pointer; transition: color 0.15s; }
    .repo-badge-browsable:hover { color: var(--text-primary); text-decoration: underline; }

    /* ── Files button on tree nodes ────────────────────────────── */
    .tree-node-files-btn {
      padding: 2px 8px; font-size: 10px; font-weight: 600;
      background: transparent; color: var(--text-muted);
      border: 1px solid var(--border-dim); border-radius: 4px;
      cursor: pointer; align-self: flex-start; margin-top: 2px;
      transition: all 0.15s;
    }
    .tree-node-files-btn:hover {
      background: var(--accent-dim); border-color: var(--accent); color: var(--text-primary);
    }

    /* ── Files panel ───────────────────────────────────────────── */
    .files-panel { display: flex; flex-direction: column; height: 100%; }
    .files-header {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 16px; border-bottom: 1px solid var(--border-dim); flex-shrink: 0;
      min-height: 40px;
    }
    .files-title {
      font-size: 13px; font-weight: 600; flex: 1;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      color: var(--text-primary);
    }
    .files-tabs { display: flex; gap: 2px; }
    .files-tab {
      padding: 3px 10px; font-size: 11px;
      border: 1px solid var(--border-visible);
      background: transparent; border-radius: var(--radius-sm);
      cursor: pointer; color: var(--text-secondary);
      transition: all 0.15s;
    }
    .files-tab:hover { background: var(--bg-hover); }
    .files-tab.active {
      background: var(--accent-dim); border-color: var(--accent); color: var(--text-primary);
    }

    .files-body { flex: 1; overflow-y: auto; padding: 0; }
    .files-loading, .files-empty {
      padding: 40px 16px; text-align: center; color: var(--text-muted); font-size: 13px;
    }

    /* File list */
    .file-list { padding: 4px 0; }
    .file-entry {
      padding: 5px 16px; font-size: 12px; cursor: pointer;
      font-family: var(--font-mono); color: var(--text-secondary);
      transition: background 0.1s;
    }
    .file-entry:hover { background: var(--bg-hover); color: var(--text-primary); }

    /* File content viewer */
    .file-viewer { display: flex; flex-direction: column; height: 100%; }
    .file-viewer-header {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 16px; border-bottom: 1px solid var(--border-subtle);
      flex-shrink: 0;
    }
    .file-viewer-back {
      background: none; border: none; color: var(--text-muted);
      cursor: pointer; font-size: 11px; padding: 2px 4px;
    }
    .file-viewer-back:hover { color: var(--text-primary); }
    .file-viewer-name {
      font-size: 11px; font-family: var(--font-mono); color: var(--text-secondary);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .file-viewer-content {
      flex: 1; overflow: auto; padding: 12px 16px; margin: 0;
      font-family: var(--font-mono); font-size: 12px; line-height: 1.5;
      color: var(--text-secondary); white-space: pre-wrap; word-break: break-all;
    }

    /* Diff viewer */
    .diff-viewer { height: 100%; overflow: auto; }
    .diff-content {
      padding: 12px 16px; margin: 0;
      font-family: var(--font-mono); font-size: 12px; line-height: 1.5;
      color: var(--text-secondary); white-space: pre;
    }
    .diff-add { color: var(--green); background: var(--green-dim); display: inline-block; width: 100%; }
    .diff-del { color: var(--red); background: var(--red-dim); display: inline-block; width: 100%; }
    .diff-hunk { color: var(--accent); }
    .diff-meta { color: var(--text-muted); }

    /* ── Selection highlight ────────────────────────────────────── */
    ::selection { background: rgba(0,0,0,0.10); color: var(--text-primary); }
  </style>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
