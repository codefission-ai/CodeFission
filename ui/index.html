    .settings-auth-ok {
      color: #28a745; font-weight: 500;
    }
    .settings-auth-missing {
      color: var(--text-muted); font-weight: 500;
    }
    .settings-auth-detail {
      color: var(--text-muted); font-size: 11px;
      font-family: monospace; letter-spacing: 0.3px;
      max-width: 200px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    /* ── API key rows ──────────────────────────────────────────── */
    .settings-api-keys {
      display: flex; flex-direction: column; gap: 6px;
      margin-top: 2px;
    }
    .settings-api-key-row {
      display: flex; align-items: center; gap: 6px;
    }
    .settings-api-key-label {
      font-size: 11px; font-weight: 500; color: var(--text-secondary);
      min-width: 80px; flex-shrink: 0;
    }
    .settings-api-key-input {
      flex: 1; min-width: 0;
    }

    /* ── Dark theme (Monokai) ────────────────────────────────────── */
    [data-theme="dark"] {
      /* Monokai warm olive backgrounds */
      --bg-deep: #1e1f1c;
      --bg-surface: #272822;
      --bg-raised: #2d2e29;
      --bg-hover: #35362f;
      --bg-active: #3c3d36;

      --shadow-sm: 0 1px 2px rgba(0,0,0,0.35);
      --shadow-md: 0 2px 8px rgba(0,0,0,0.45);
      --shadow-lg: 0 8px 30px rgba(0,0,0,0.65);

      --border-subtle: rgba(255,255,255,0.04);
      --border-dim: rgba(255,255,255,0.08);
      --border-visible: rgba(255,255,255,0.15);

      /* Monokai text */
      --text-primary: #f8f8f2;
      --text-secondary: #ccccc0;
      --text-muted: #75715e;
      --text-dim: #4a4a3e;

      /* Monokai green accent */
      --accent: #a6e22e;
      --accent-dim: rgba(166,226,46,0.10);
      --accent-glow: rgba(166,226,46,0.15);

      /* Monokai semantic colors */
      --green: #a6e22e;
      --green-dim: rgba(166,226,46,0.12);
      --red: #f92672;
      --red-dim: rgba(249,38,114,0.12);
      --amber: #fd971f;
      --amber-dim: rgba(253,151,31,0.12);
    }

    /* Dark (Monokai): selected & coded node bg overrides */
    [data-theme="dark"] .tree-node.selected { background: #2a2b24; }
    [data-theme="dark"] .tree-node.has-code { background: #25261f; border-left: 3px solid #4caf50; }
    [data-theme="dark"] .tree-node.has-code:hover { background: #2a2b23; border-left-color: #66bb6a; }
    [data-theme="dark"] .tree-node.has-code.selected { background: #2d2e26; border-left-color: #66bb6a; }
    [data-theme="dark"] .tree-node.tree-node-root.selected { background: #2a2b24; }
    [data-theme="dark"] .tree-node.tree-node-root.selected:hover { background: #2a2b24; }

    /* Dark: scrollbar */
    [data-theme="dark"] ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.10); }
    [data-theme="dark"] ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.18); }

    /* Dark: code block inset shadow */
    [data-theme="dark"] .msg.assistant .msg-text pre {
      box-shadow: inset 0 1px 3px rgba(0,0,0,0.3);
    }

    /* Dark: selection highlight */
    [data-theme="dark"] ::selection { background: rgba(166,226,46,0.25); color: #f8f8f2; }
    [data-theme="dark"] .node-modal-response ::selection { background: rgba(166,226,46,0.25); }

    /* Dark (Monokai): highlight.js syntax colors */
    [data-theme="dark"] .hljs-keyword,
    [data-theme="dark"] .hljs-selector-tag,
    [data-theme="dark"] .hljs-built_in      { color: #f92672; }
    [data-theme="dark"] .hljs-string,
    [data-theme="dark"] .hljs-attr          { color: #e6db74; }
    [data-theme="dark"] .hljs-comment,
    [data-theme="dark"] .hljs-quote         { color: #75715e; font-style: italic; }
    [data-theme="dark"] .hljs-number,
    [data-theme="dark"] .hljs-literal       { color: #ae81ff; }
    [data-theme="dark"] .hljs-type,
    [data-theme="dark"] .hljs-class .hljs-title,
    [data-theme="dark"] .hljs-title.class_  { color: #a6e22e; }
    [data-theme="dark"] .hljs-function .hljs-title,
    [data-theme="dark"] .hljs-title.function_ { color: #a6e22e; }
    [data-theme="dark"] .hljs-variable,
    [data-theme="dark"] .hljs-template-variable { color: #fd971f; }
    [data-theme="dark"] .hljs-meta          { color: #75715e; }
    [data-theme="dark"] .hljs-tag,
    [data-theme="dark"] .hljs-name          { color: #f92672; }
    [data-theme="dark"] .hljs-attribute     { color: #a6e22e; }
    [data-theme="dark"] .hljs-symbol,
    [data-theme="dark"] .hljs-bullet        { color: #e6db74; }
    [data-theme="dark"] .hljs-params        { color: #fd971f; }
    [data-theme="dark"] .hljs-regexp        { color: #e6db74; }
    [data-theme="dark"] .hljs-selector-class,
    [data-theme="dark"] .hljs-selector-id   { color: #a6e22e; }

    /* Dark mode toggle button */
    .theme-toggle {
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      background: transparent; border: none; border-radius: 8px;
      color: var(--text-muted); cursor: pointer;
      transition: background 0.15s, color 0.15s; flex-shrink: 0;
    }
    .theme-toggle:hover { background: var(--bg-hover); color: var(--text-primary); }

    /* ── Delete circle (top-left hover reveal) ────────────────── */
    .delete-circle-zone {
      position: absolute; top: -8px; left: -8px;
      width: 22px; height: 22px;
      z-index: 10;
    }
    .delete-circle {
      width: 18px; height: 18px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      background: var(--red, #dc2626); color: #fff;
      border: 2px solid var(--bg-deep, #fff);
      font-size: 12px; line-height: 1; font-weight: 700;
      cursor: pointer; padding: 0;
      opacity: 0; transition: opacity 0.12s;
      pointer-events: none;
    }
    .delete-circle-zone:hover .delete-circle {
      opacity: 1; pointer-events: auto;
    }
    [data-theme="dark"] .delete-circle { background: #f87171; border-color: var(--bg-deep, #1a1a1e); color: #1a1a1e; }

    /* ── Undo toast ─────────────────────────────────────────────── */
    .undo-toast {
      position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
      display: flex; align-items: center; gap: 12px;
      padding: 8px 16px; border-radius: 8px;
      background: var(--text-primary, #1a1a1e); color: #fff;
      font-size: 13px; font-weight: 500;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
      z-index: 100;
      animation: undo-toast-in 0.2s ease-out;
    }
    .undo-toast-btn {
      padding: 2px 10px; font-size: 12px; font-weight: 600;
      background: rgba(255,255,255,0.15); color: #fff;
      border: 1px solid rgba(255,255,255,0.25); border-radius: 4px;
      cursor: pointer; transition: background 0.15s;
    }
    .undo-toast-btn:hover { background: rgba(255,255,255,0.25); }
    @keyframes undo-toast-in {
      from { opacity: 0; transform: translateX(-50%) translateY(10px); }
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
    [data-theme="dark"] .undo-toast { background: #e0e0e5; color: #1a1a1e; }
    [data-theme="dark"] .undo-toast-btn { background: rgba(0,0,0,0.1); color: #1a1a1e; border-color: rgba(0,0,0,0.15); }
    [data-theme="dark"] .undo-toast-btn:hover { background: rgba(0,0,0,0.2); }

    [data-theme="dark"] .drop-zone-active textarea {
      border-color: #60a5fa !important;
      background: rgba(96, 165, 250, 0.08) !important;
    }
    [data-theme="dark"] .drop-zone-overlay {
      background: rgba(96, 165, 250, 0.1);
      border-color: #60a5fa; color: #93bbfc;
    }
    /* ── Tree list: branch badge, staleness, project items ───── */
    .tree-branch-badge {
      font-size: 9px; font-weight: 500;
      padding: 1px 5px; border-radius: 3px;
      background: var(--accent-dim); color: var(--text-muted);
      white-space: nowrap; flex-shrink: 0;
    }
    .tree-activity-dot.stale {
      background: var(--amber, #d97706);
    }
    .project-rename-input {
      flex: 1; min-width: 0;
      font-size: 12px; padding: 2px 6px;
      border: 1px solid var(--border-visible); border-radius: 4px;
      background: var(--bg-deep); color: var(--text-primary);
      outline: none;
    }
    .project-display-name {
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      min-width: 0; flex: 1;
    }
    .project-time {
      font-size: 9px; color: var(--text-dim);
      white-space: nowrap; flex-shrink: 0; margin-left: 4px;
    }
    .branch-picker {
      font-size: 11px; padding: 2px 4px;
      background: var(--bg-surface); color: var(--text-secondary);
      border: 1px solid var(--border-dim); border-radius: 4px;
      outline: none; max-width: 100px; flex-shrink: 0;
    }

    /* ── Staleness banner ──────────────────────────────────────── */
    .staleness-banner {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 10px; margin: 4px 0;
      font-size: 11px; color: var(--amber, #d97706);
      background: var(--amber-dim, rgba(217,119,6,0.08));
      border: 1px solid rgba(217,119,6,0.2);
      border-radius: 6px;
    }
    .staleness-banner span { flex: 1; }
    .staleness-update-btn {
      font-size: 10px; font-weight: 600;
      padding: 2px 8px; border-radius: 4px;
      background: transparent; color: var(--amber, #d97706);
      border: 1px solid rgba(217,119,6,0.3);
      cursor: pointer; white-space: nowrap;
      transition: all 0.15s;
    }
    .staleness-update-btn:hover {
      background: rgba(217,119,6,0.12); border-color: var(--amber, #d97706);
    }

    /* ── Merge result banner ──────────────────────────────────── */
    .merge-result-banner {
      display: flex; align-items: flex-start; gap: 8px;
      padding: 6px 10px; margin-top: 4px;
      font-size: 11px; border-radius: 6px;
    }
    .merge-result-banner.success {
      color: var(--green, #16a34a);
      background: var(--green-dim, rgba(22,163,74,0.10));
      border: 1px solid rgba(22,163,74,0.2);
    }
    .merge-result-banner.error {
      color: var(--red, #dc2626);
      background: var(--red-dim, rgba(220,38,38,0.10));
      border: 1px solid rgba(220,38,38,0.2);
    }
    .merge-result-banner span { flex: 1; }
    .merge-result-error { flex: 1; }
    .merge-conflicts-list {
      margin: 4px 0 0 14px; font-size: 10px;
      font-family: var(--font-mono); list-style: disc;
    }
    .merge-result-dismiss {
      background: none; border: none; color: inherit;
      cursor: pointer; font-size: 14px; line-height: 1;
      opacity: 0.6; padding: 0;
    }
    .merge-result-dismiss:hover { opacity: 1; }
    .tree-node-action-btn.merge-btn {
      color: var(--accent); border-color: var(--border-dim);
    }
    .tree-node-action-btn.merge-btn:hover {
      background: var(--accent-dim); border-color: var(--accent); color: var(--text-primary);
    }
    .tree-node-action-btn.merge-btn.merging {
      opacity: 0.6; cursor: wait;
    }

    /* ── Git graph ──────────────────────────────────────────────── */
    .git-graph {
      display: flex; flex-direction: column;
      height: 100%; overflow: hidden;
    }
    .git-graph-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px 12px; border-bottom: 1px solid var(--border-dim);
      flex-shrink: 0;
    }
    .git-graph-header h2 {
      font-size: 16px; font-weight: 600; color: var(--text-primary);
      margin: 0;
    }
    .git-graph-close-btn {
      width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
      background: transparent; border: 1px solid var(--border-dim); border-radius: 6px;
      color: var(--text-muted); cursor: pointer; transition: all 0.15s;
    }
    .git-graph-close-btn:hover {
      background: var(--bg-hover); color: var(--text-primary); border-color: var(--border-visible);
    }
    .git-graph-body {
      flex: 1; overflow-y: auto; overflow-x: auto;
      display: flex; flex-direction: row;
      padding: 8px 0 20px;
    }
    .git-graph-svg {
      flex-shrink: 0;
      margin-left: 12px;
    }
    .git-graph-info {
      flex: 1; min-width: 0;
      padding-left: 8px; padding-right: 20px;
    }
    .git-graph-info-row {
      display: flex; flex-direction: column; justify-content: center;
      cursor: pointer; padding: 0 8px;
      border-radius: var(--radius-sm);
      transition: background 0.12s;
    }
    .git-graph-info-row:hover { background: var(--bg-hover); }
    .git-graph-status {
      text-align: center; padding: 40px 20px;
      color: var(--text-muted); font-size: 13px;
      width: 100%;
    }
    .git-graph-error { color: var(--red); }
    .git-graph-row-main {
      display: flex; align-items: center; gap: 8px; flex-wrap: nowrap;
      min-width: 0;
    }
    .git-graph-sha {
      font-family: var(--font-mono); font-size: 11px; font-weight: 600;
      color: var(--accent); flex-shrink: 0;
    }
    .git-graph-message {
      font-size: 13px; color: var(--text-primary);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      flex: 1; min-width: 0;
    }
    .git-graph-refs {
      display: flex; gap: 4px; flex-shrink: 0; flex-wrap: wrap;
    }
    .git-graph-ref-badge {
      font-size: 9px; font-weight: 600; padding: 1px 6px; border-radius: 3px;
      background: var(--accent-dim); color: var(--accent);
      white-space: nowrap;
    }
    .git-graph-cf-badges {
      display: flex; gap: 4px; flex-shrink: 0;
    }
    .git-graph-cf-badge {
      font-size: 9px; font-weight: 600; padding: 1px 6px; border-radius: 3px;
      white-space: nowrap;
    }
    .git-graph-cf-badge.trees {
      background: rgba(59,130,246,0.12); color: #3b82f6;
    }
    .git-graph-cf-badge.nodes {
      background: var(--green-dim); color: var(--green);
    }
    .git-graph-time {
      font-size: 11px; color: var(--text-muted); flex-shrink: 0;
      margin-left: auto;
    }
    .git-graph-info-row { position: relative; }
    .git-graph-info-row.expanded { z-index: 10; }
    .git-graph-popover {
      position: absolute; top: 100%; left: 0; z-index: 20;
      background: var(--bg-raised); border: 1px solid var(--border-visible);
      border-radius: 8px; padding: 12px; margin-top: 2px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
      min-width: 280px; max-width: 400px;
    }
    .git-graph-popover-header {
      display: flex; gap: 8px; align-items: center; margin-bottom: 6px;
    }
    .git-graph-popover-sha {
      font-family: var(--font-mono, monospace); font-size: 11px;
      color: var(--accent); font-weight: 600;
    }
    .git-graph-popover-author { font-size: 11px; color: var(--text-dim); }
    .git-graph-popover-message {
      font-size: 12px; color: var(--text-primary); margin-bottom: 10px;
      line-height: 1.4; word-break: break-word;
    }
    .git-graph-popover-actions { display: flex; flex-direction: column; gap: 6px; }
    .git-graph-entity-btn {
      font-size: 12px; padding: 6px 12px; border-radius: var(--radius-sm);
      border: 1px solid var(--border-visible); background: transparent;
      cursor: pointer; color: var(--text-secondary); transition: all 0.15s;
      text-align: left; width: 100%;
    }
    .git-graph-entity-btn:hover {
      background: var(--bg-hover); color: var(--text-primary);
    }
    .git-graph-entity-btn.tree {
      border-color: rgba(59,130,246,0.3); color: #3b82f6;
    }
    .git-graph-entity-btn.tree:hover {
      background: rgba(59,130,246,0.08);
    }
    .git-graph-entity-btn.node {
      border-color: rgba(22,163,74,0.3); color: var(--green);
    }
    .git-graph-entity-btn.node:hover {
      background: var(--green-dim);
    }
    .git-graph-entity-btn.plant {
      border-color: var(--border-visible); color: var(--text-muted);
    }
    .git-graph-entity-btn.plant:hover {
      background: var(--accent-dim); color: var(--text-primary);
      border-color: var(--accent);
    }
    [data-theme="dark"] .git-graph-cf-badge.trees {
      background: rgba(59,130,246,0.15); color: #60a5fa;
    }
    [data-theme="dark"] .git-graph-entity-btn.tree {
      border-color: rgba(59,130,246,0.3); color: #60a5fa;
    }
    [data-theme="dark"] .git-graph-entity-btn.tree:hover {
      background: rgba(59,130,246,0.12);
    }

  </style>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
