<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CodeFission</title>
  <style>
    /* ── Design tokens (adapted from WhatTheBot) ──────────────── */
    :root {
      --bg-deep: #ffffff;
      --bg-surface: #f3f3f5;
      --bg-raised: #eaeaed;
      --bg-hover: #e0e0e5;
      --bg-active: #d6d6dd;

      --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
      --shadow-md: 0 2px 8px rgba(0,0,0,0.08);
      --shadow-lg: 0 8px 30px rgba(0,0,0,0.10);

      --border-subtle: rgba(0,0,0,0.04);
      --border-dim: rgba(0,0,0,0.08);
      --border-visible: rgba(0,0,0,0.14);

      --text-primary: #1a1a1e;
      --text-secondary: #4a4a54;
      --text-muted: #8a8a96;
      --text-dim: #b0b0ba;

      --accent: #3a3a42;
      --accent-dim: rgba(0,0,0,0.05);
      --accent-glow: rgba(0,0,0,0.03);

      --green: #16a34a;
      --green-dim: rgba(22,163,74,0.10);
      --red: #dc2626;
      --red-dim: rgba(220,38,38,0.10);
      --amber: #d97706;
      --amber-dim: rgba(217,119,6,0.08);

      --radius-sm: 6px;
      --radius-md: 10px;

      --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, system-ui, sans-serif;
      --font-mono: "SF Mono", "Fira Code", "Cascadia Code", "JetBrains Mono", Menlo, monospace;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font-sans);
      font-size: 13px;
      line-height: 1.55;
      background: var(--bg-deep);
      color: var(--text-secondary);
      overflow: hidden;
    }

    /* ── Scrollbar ──────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.10); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.18); }

    /* ── Layout ─────────────────────────────────────────────────── */
    .app {
      display: flex;
      width: 100vw;
      height: 100vh;
      background: var(--bg-deep);
      color: var(--text-secondary);
    }
    .main-area {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
    }

    /* ── Resize handle ──────────────────────────────────────────── */
    .resize-handle {
      width: 4px;
      cursor: col-resize;
      background: transparent;
      transition: background 0.15s;
      flex-shrink: 0;
      z-index: 10;
    }
    .resize-handle:hover,
    .resize-handle.dragging {
      background: var(--accent);
    }

    /* ── Toolbar ──────────────────────────────────────────────────── */
    .toolbar {
      display: flex;
      align-items: center;
      height: 44px;
      padding: 0 8px;
      border-bottom: 1px solid var(--border-dim);
      flex-shrink: 0;
      background: var(--bg-deep);
      gap: 8px;
    }
    .toolbar-left, .toolbar-right {
      display: flex;
      align-items: center;
      gap: 2px;
      flex-shrink: 0;
    }
    .toolbar-center {
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .toolbar-tree-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── Icon button ─────────────────────────────────────────────── */
    .icon-btn {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: none;
      border-radius: 8px;
      color: var(--text-muted);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      flex-shrink: 0;
    }
    .icon-btn:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
    }
    .has-tooltip {
      position: relative;
    }
    .has-tooltip > .tooltip {
      display: none;
      position: absolute;
      top: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%);
      background: var(--text-primary);
      color: var(--bg-deep);
      font-size: 11px;
      font-weight: 500;
      padding: 4px 8px;
      border-radius: 6px;
      white-space: nowrap;
      pointer-events: none;
      z-index: 50;
      box-shadow: var(--shadow-md);
    }
    .has-tooltip > .tooltip kbd {
      display: inline-block;
      background: rgba(255,255,255,0.15);
      padding: 0 4px;
      border-radius: 3px;
      font-family: var(--font-sans);
      font-size: 10px;
      margin-left: 4px;
    }
    .has-tooltip:hover > .tooltip {
      display: block;
    }

    /* ── Sidebar ────────────────────────────────────────────────── */
    .sidebar {
      width: 220px;
      min-width: 0;
      background: var(--bg-surface);
      display: flex;
      flex-direction: column;
      box-shadow: var(--shadow-md);
      overflow: hidden;
      transition: width 0.2s ease;
    }
    .sidebar.collapsed {
      width: 0 !important;
      min-width: 0;
      border-right: none;
      overflow: hidden;
    }
    .tree-list { display: flex; flex-direction: column; height: 100%; }
    .tree-list-header {
      padding: 14px 16px;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.5px;
      color: var(--text-primary);
      border-bottom: 1px solid var(--border-dim);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .new-project-bar { padding: 6px 8px; }
    .new-project-btn {
      display: flex; align-items: center; gap: 6px;
      width: 100%; padding: 6px 10px;
      background: none; border: 1px dashed var(--border-dim);
      border-radius: var(--radius-sm); cursor: pointer;
      color: var(--text-muted); font-size: 12px;
      font-family: var(--font-sans);
      transition: color 0.1s, border-color 0.1s;
    }
    .new-project-btn:hover {
      color: var(--text-primary); border-color: var(--text-muted);
    }
    .tree-list-create { display: flex; padding: 8px; gap: 4px; }
    .tree-list-create input {
      flex: 1; padding: 6px 10px;
      border: 1px solid var(--border-dim);
      border-radius: var(--radius-sm);
      font-size: 12px; outline: none;
      background: var(--bg-raised);
      color: var(--text-primary);
      font-family: var(--font-sans);
    }
    .tree-list-create input::placeholder { color: var(--text-muted); }
    .tree-list-create input:focus { border-color: var(--accent); }
    .tree-list-create button {
      width: 30px; height: 30px;
      display: flex; align-items: center; justify-content: center;
      background: var(--accent); color: #fff; border: none;
      border-radius: var(--radius-sm); cursor: pointer; flex-shrink: 0;
    }
    .tree-list-create button:hover { filter: brightness(1.15); }
    .tree-list-items { flex: 1; overflow-y: auto; padding: 4px 0; }

    /* ── Project sections ──────────────────────────────────────── */
    .project-section { margin-bottom: 4px; }
    .project-header {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 12px; cursor: pointer; font-size: 11px;
      font-weight: 700; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.04em;
      user-select: none; transition: background 0.1s;
    }
    .project-header:hover { background: var(--bg-hover); }
    .project-header.active { color: var(--text-secondary); }
    .project-chevron { font-size: 8px; width: 10px; text-align: center; flex-shrink: 0; color: var(--text-muted); }
    .project-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; min-width: 0; }
    .project-count {
      font-size: 10px; color: var(--text-muted);
      background: var(--bg-raised); border-radius: 8px;
      padding: 0 5px; flex-shrink: 0;
    }
    .project-add-btn {
      width: 18px; height: 18px;
      display: flex; align-items: center; justify-content: center;
      background: none; border: none; color: var(--text-muted);
      cursor: pointer; border-radius: 4px; opacity: 0;
      transition: opacity 0.1s, color 0.1s;
      flex-shrink: 0;
    }
    .project-header:hover .project-add-btn,
    .project-header:hover .project-graph-btn { opacity: 1; }
    .project-add-btn:hover, .project-graph-btn:hover { color: var(--text-primary); }
    .project-graph-btn {
      width: 18px; height: 18px;
      display: flex; align-items: center; justify-content: center;
      background: none; border: none; color: var(--text-muted);
      cursor: pointer; border-radius: 4px; opacity: 0;
      transition: opacity 0.1s, color 0.1s;
    }
    .project-trees { padding-left: 4px; }
    .project-create-inline {
      display: flex; padding: 4px 8px; gap: 4px;
    }
    .project-create-inline input {
      flex: 1; padding: 4px 8px;
      border: 1px solid var(--border-dim);
      border-radius: var(--radius-sm);
      font-size: 11px; outline: none;
      background: var(--bg-raised);
      color: var(--text-primary);
      font-family: var(--font-sans);
    }
    .project-create-inline input::placeholder { color: var(--text-muted); }
    .project-create-inline input:focus { border-color: var(--accent); }
    .project-create-inline button {
      width: 24px; height: 24px;
      display: flex; align-items: center; justify-content: center;
      background: var(--accent); color: #fff; border: none;
      border-radius: var(--radius-sm); cursor: pointer; flex-shrink: 0;
    }
    .project-create-inline button:hover { filter: brightness(1.15); }

    .tree-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 5px 12px 5px 20px; cursor: pointer; font-size: 12px;
      color: var(--text-secondary);
      border-radius: 4px; margin: 1px 6px;
      transition: background 0.1s;
    }
    .tree-item:hover { background: var(--bg-hover); }
    .tree-item.active {
      background: var(--bg-active);
      color: var(--text-primary);
      font-weight: 500;
    }
    .delete-btn {
      width: 20px; height: 20px;
      display: flex; align-items: center; justify-content: center;
      background: none; border: none; color: var(--text-muted);
      cursor: pointer; border-radius: 4px; opacity: 0;
      transition: opacity 0.1s, color 0.1s, background 0.1s;
    }
    .tree-item:hover .delete-btn { opacity: 1; }
    .delete-btn:hover { color: var(--red); background: var(--red-dim); }

    /* ── Tree activity indicators ────────────────────────────────── */
    .tree-item-name {
      display: flex; align-items: center; gap: 6px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      min-width: 0;
    }
    .tree-activity-dot {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .tree-activity-dot.streaming {
      background: #16a34a;
      animation: pulse-dot 1.5s ease-in-out infinite;
    }
    .tree-activity-dot.error {
      background: #dc2626;
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(22, 163, 74, 0.4); }
      50% { opacity: 0.6; box-shadow: 0 0 0 3px rgba(22, 163, 74, 0); }
    }
    .tree-activity-badge {
      font-size: 9px;
      color: var(--text-muted);
      flex-shrink: 0;
      line-height: 1;
    }

    /* ── Canvas ─────────────────────────────────────────────────── */
    .canvas {
      flex: 1;
      min-width: 0;
      min-height: 0;
      background: var(--bg-deep);
    }
    .canvas-empty {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 100%; color: var(--text-dim); gap: 6px;
    }
    .empty-icon { color: var(--text-dim); margin-bottom: 8px; }
    .logo { font-size: 22px; font-weight: 700; letter-spacing: 1px; color: var(--text-primary); }

    /* Project setup screen */
    .project-setup {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 100%; padding: 40px;
    }
    .project-setup h2 { font-size: 24px; font-weight: 600; margin: 0 0 8px; color: var(--text-primary); }
    .project-setup-hint { color: var(--text-dim); font-size: 0.85rem; margin: 0 0 32px; }
    .project-setup-options {
      display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; justify-content: center;
    }
    .project-setup-option {
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      padding: 24px 28px; border: 1px solid var(--border); border-radius: 12px;
      cursor: pointer; min-width: 160px; transition: all 0.15s;
      background: var(--bg-deep);
    }
    .project-setup-option:hover {
      border-color: var(--accent); background: var(--bg-hover);
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .project-setup-option-icon { color: var(--text-muted); }
    .project-setup-option-label { font-weight: 600; font-size: 0.95rem; color: var(--text-primary); }
    .project-setup-option-desc { font-size: 0.75rem; color: var(--text-dim); text-align: center; }
    .project-setup-folder-input {
      display: flex; gap: 8px; width: 100%; max-width: 500px; margin-top: 16px;
    }
    .project-setup-folder-input input {
      flex: 1; padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px;
      background: var(--bg-deep); color: var(--text-primary); font-size: 0.85rem;
      font-family: var(--font-mono, monospace);
    }
    .project-setup-folder-input input:focus { outline: none; border-color: var(--accent); }
    .project-setup-btn {
      padding: 8px 20px; border-radius: 6px; border: 1px solid var(--border);
      cursor: pointer; font-size: 0.85rem; transition: all 0.15s;
    }
    .project-setup-btn.primary {
      background: var(--accent); color: white; border-color: var(--accent);
    }
    .project-setup-btn.primary:hover { opacity: 0.9; }
    .project-setup-btn.primary:disabled { opacity: 0.4; cursor: default; }
    .project-setup-btn.secondary {
      background: transparent; color: var(--text-muted); margin-top: 12px;
    }
    .project-setup-btn.secondary:hover { color: var(--text-primary); }
    .project-setup-name { display: flex; flex-direction: column; align-items: center; gap: 12px; }
    .project-setup-name-input { display: flex; flex-direction: column; gap: 6px; width: 100%; max-width: 400px; }
    .project-setup-name-input label { font-size: 0.8rem; color: var(--text-muted); font-weight: 600; }
    .project-setup-name-input input {
      padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px;
      background: var(--bg-deep); color: var(--text-primary); font-size: 1rem;
    }
    .project-setup-name-input input:focus { outline: none; border-color: var(--accent); }
    .project-setup-name-hint { font-size: 0.75rem; color: var(--text-dim); }
    .project-setup-actions { display: flex; gap: 12px; margin-top: 16px; }
    .project-setup-folder-actions { margin-top: 12px; }
    .project-setup-git-warning {
      margin-top: 12px; padding: 12px 16px; border-radius: 8px;
      background: #fff3e0; border: 1px solid #ffb74d; max-width: 500px; width: 100%;
    }
    .git-warning-text { font-size: 0.85rem; color: #e65100; margin-bottom: 8px; }
    .git-warning-checkbox {
      display: flex; align-items: center; gap: 8px; font-size: 0.85rem;
      color: var(--text-primary); cursor: pointer;
    }
    .git-warning-checkbox input { cursor: pointer; }
    .git-warning-checkbox code { font-size: 0.8rem; background: rgba(0,0,0,0.06); padding: 1px 4px; border-radius: 3px; }
    .project-setup-git-ok {
      margin-top: 12px; padding: 8px 16px; border-radius: 8px;
      background: #e8f5e9; border: 1px solid #66bb6a; font-size: 0.85rem; color: #2e7d32;
      max-width: 500px; width: 100%;
    }
    [data-theme="dark"] .project-setup-git-warning { background: #3e2723; border-color: #8d6e63; }
    [data-theme="dark"] .git-warning-text { color: #ffab91; }
    [data-theme="dark"] .git-warning-checkbox code { background: rgba(255,255,255,0.1); }
    [data-theme="dark"] .project-setup-git-ok { background: #1b3a1b; border-color: #4caf50; color: #81c784; }
    .project-setup-error {
      color: #e55; font-size: 0.8rem; padding: 6px 12px; border-radius: 6px;
      background: rgba(238,85,85,0.1); border: 1px solid rgba(238,85,85,0.3);
      margin-bottom: 12px; max-width: 500px; width: 100%; text-align: center;
    }
    .project-setup-local,
    .project-setup-github,
    .project-setup-empty {
      display: flex; flex-direction: column; align-items: center; gap: 12px; width: 100%; max-width: 600px;
    }

    /* Folder browser */
    .folder-browser {
      width: 100%; max-width: 500px; border: 1px solid var(--border); border-radius: 8px;
      background: var(--bg-deep); overflow: hidden; margin-top: 8px;
    }
    .folder-browser-header {
      padding: 8px 12px; border-bottom: 1px solid var(--border); background: var(--bg-hover);
    }
    .folder-browser-path {
      font-family: var(--font-mono, monospace); font-size: 0.75rem; color: var(--text-muted);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: block;
    }
    .folder-browser-toolbar {
      display: flex; gap: 8px; padding: 6px 12px; border-bottom: 1px solid var(--border);
    }
    .folder-browser-up {
      display: flex; align-items: center; gap: 4px; padding: 3px 8px; border: 1px solid var(--border);
      border-radius: 4px; background: transparent; color: var(--text-muted); cursor: pointer;
      font-size: 0.75rem; transition: all 0.15s;
    }
    .folder-browser-up:hover { color: var(--text-primary); border-color: var(--accent); }
    .folder-browser-list {
      max-height: 240px; overflow-y: auto; padding: 4px 0;
    }
    .folder-browser-item {
      display: flex; align-items: center; gap: 8px; padding: 6px 12px; cursor: pointer;
      transition: background 0.1s; font-size: 0.8rem; color: var(--text-primary);
    }
    .folder-browser-item:hover { background: var(--bg-hover); }
    .folder-browser-icon { display: flex; flex-shrink: 0; }
    .folder-browser-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .folder-browser-git-badge {
      font-size: 0.65rem; padding: 1px 5px; border-radius: 3px; margin-left: auto; flex-shrink: 0;
      background: rgba(var(--accent-rgb, 59,130,246), 0.15); color: var(--accent);
      font-weight: 600;
    }
    .folder-browser-loading,
    .folder-browser-empty {
      padding: 16px; text-align: center; color: var(--text-dim); font-size: 0.8rem;
    }
    .folder-browser-error {
      padding: 8px 12px; color: #e55; font-size: 0.8rem;
    }
    .folder-browser-select {
      margin: 8px 12px 12px; width: calc(100% - 24px); text-align: center;
    }
    .empty-sub { font-size: 13px; color: var(--text-muted); max-width: 280px; text-align: center; line-height: 1.5; }

    /* React Flow overrides for dark theme */
    .react-flow__background { background: var(--bg-deep) !important; }
    .react-flow__node {
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .react-flow__node.dragging,
    .react-flow__node[data-id^="note-"] { transition: none; }
    .react-flow__edge path { transition: d 0.35s cubic-bezier(0.4, 0, 0.2, 1); }
    .react-flow__handle { transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1); }
    .tree-node {
      background: var(--bg-raised); border: 1px solid var(--border-dim); border-radius: var(--radius-sm);
      padding: 6px 14px; cursor: pointer; display: flex; align-items: center;
      flex-direction: row;
      gap: 6px; font-size: 11px; min-width: 80px; max-width: 180px;
      color: var(--text-secondary);
      box-shadow: var(--shadow-sm);
      transition: border-color 0.15s, background 0.15s, box-shadow 0.15s, max-height 0.35s ease;
      position: relative;
      will-change: transform;
    }
    .tree-node-worktree-id {
      display: none;
      position: absolute;
      bottom: 2px; right: 6px;
      font-size: 9px; color: var(--text-muted);
      opacity: 0.7; pointer-events: none;
      white-space: nowrap; font-family: monospace;
    }
    .tree-node:hover .tree-node-worktree-id { display: block; }
    .tree-node.tree-node-root {
      flex-direction: column;
      align-items: stretch;
      min-width: 220px; max-width: 300px;
      padding: 6px 8px;
      cursor: default;
      gap: 4px;
    }
    .tree-node:hover { background: var(--bg-hover); border-color: var(--text-muted); box-shadow: var(--shadow-md); }
    .tree-node.selected { border-color: var(--accent); background: #e0e4ee; color: var(--text-primary); }
    .tree-node.has-code { background: #f0f4ef; border-left: 3px solid #66bb6a; }
    .tree-node.has-code:hover { background: #e8ece7; border-left-color: #4caf50; }
    .tree-node.has-code.selected { background: #dce4da; border-left-color: #43a047; }
    .tree-node-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .tree-node-label { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .tree-node-unread {
      width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
      background: var(--green);
      box-shadow: 0 0 6px 1px var(--green-dim);
    }
    .tree-node.unread {
      box-shadow: 0 0 0 1.5px var(--green-dim);
    }

    /* Root node */
    .tree-node.tree-node-root:hover { background: var(--bg-raised); border-color: var(--border-visible); }
    .tree-node.tree-node-root.selected { border-color: var(--accent); background: #e0e4ee; }
    .tree-node.tree-node-root.selected:hover { background: #e0e4ee; border-color: var(--accent); }
    .tree-node-root-active {
      flex-direction: column;
      align-items: stretch;
      max-height: 300px;
      overflow-y: auto;
    }
    .tree-node-root-input {
      min-width: 0; width: 100%;
      padding: 4px 8px; font-size: 11px;
      font-family: var(--font-mono);
      background: var(--bg-surface);
      color: var(--text-primary);
      border: 1px solid var(--border-dim);
      border-radius: 4px; outline: none;
      resize: none; line-height: 1.4;
      overflow: hidden;
      min-height: 24px; max-height: 200px;
    }
    .tree-node-root-input::placeholder { color: var(--text-muted); }
    .tree-node-root-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent-glow);
    }

    /* Root node sections (skill, files, message) */
    .root-section {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .root-section-label {
      font-size: 9px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      padding: 0 2px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .root-section-copy {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 9px;
      font-family: var(--font-mono);
      padding: 0 3px;
      border-radius: 3px;
      opacity: 0.6;
      transition: opacity 0.15s, background 0.15s;
      margin-left: auto;
      text-transform: none;
      letter-spacing: 0;
      font-weight: 500;
    }
    .root-section-copy:hover { opacity: 1; background: var(--bg-hover); }
    .root-section-input {
      min-width: 0; width: 100%;
      padding: 4px 8px; font-size: 11px;
      font-family: var(--font-mono);
      background: var(--bg-surface);
      color: var(--text-primary);
      border: 1px solid var(--border-dim);
      border-radius: 4px; outline: none;
      resize: none; line-height: 1.4;
      overflow: hidden;
      min-height: 24px; max-height: 150px;
    }
    .root-section-input::placeholder { color: var(--text-muted); }
    .root-section-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent-glow);
    }
    .root-section-locked .root-section-input {
      opacity: 0.5;
      cursor: not-allowed;
      background: var(--bg-raised);
    }
    .root-section-locked .root-section-label {
      opacity: 0.5;
    }
    .root-section-locked .repo-badge {
      opacity: 0.5;
    }
    .stream-cursor {
      display: inline-block;
      width: 6px; height: 12px;
      background: var(--accent);
      margin-left: 2px;
      animation: cursor-blink 0.8s infinite;
      vertical-align: text-bottom;
    }
    @keyframes cursor-blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    .tree-node.expanded {
      max-width: 340px;
      flex-direction: column;
      align-items: flex-start;
      padding: 8px 14px;
      position: relative;
    }
    .tree-node.expanded .tree-node-label { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; }
    .tree-node-preview {
      display: flex;
      flex-direction: column;
      gap: 6px;
      width: 100%;
      margin-top: 6px;
      font-size: 11px;
      line-height: 1.4;
      interpolate-size: allow-keywords;
      transition: height 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .tree-node-user {
      background: var(--bg-active);
      padding: 4px 8px;
      border-radius: 4px;
      color: var(--text-primary);
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 55px;
      overflow: hidden;
    }
    .tree-node-user { position: relative; }
    .collapse-btn {
      position: absolute; top: 3px; right: 3px;
      width: 16px; height: 16px;
      background: none; border: 1px solid transparent; border-radius: 3px;
      color: var(--text-muted); font-size: 8px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity 0.15s, background 0.1s, border-color 0.1s;
    }
    .tree-node-user:hover .collapse-btn { opacity: 1; }
    .collapse-btn:hover {
      background: var(--bg-hover); border-color: var(--border-dim);
      color: var(--text-primary);
    }
    .tree-node-assistant {
      padding: 4px 8px;
      border-left: 2px solid var(--accent);
      color: var(--text-secondary);
      word-break: break-word;
      max-height: 300px;
      overflow-y: hidden;
      width: 100%;
    }
    .tree-node.selected .tree-node-assistant {
      overflow-y: auto;
    }
    .tree-node-input {
      display: flex;
      gap: 4px;
      margin-top: 4px;
      width: 100%;
      position: relative;
      align-items: flex-end;
    }
    .tree-node-textarea {
      flex: 1;
      padding: 4px 8px;
      border: 1px solid var(--border-dim);
      border-radius: 4px;
      font-size: 11px;
      font-family: var(--font-mono);
      background: var(--bg-surface);
      color: var(--text-primary);
      resize: none;
      outline: none;
      line-height: 1.4;
      min-height: 24px; max-height: 150px;
      overflow: hidden;
    }
    .tree-node-textarea::placeholder { color: var(--text-muted); }
    .tree-node-textarea:focus { border-color: var(--accent); }

    /* ── Drop zone ─────────────────────────────────────────────── */
    .drop-zone { position: relative; width: 100%; }
    .drop-zone-active textarea {
      border-color: #3b82f6 !important;
      background: rgba(59, 130, 246, 0.05) !important;
    }
    .drop-zone-overlay {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: rgba(59, 130, 246, 0.08);
      border: 2px dashed #3b82f6; border-radius: 4px;
      color: #3b82f6; font-size: 11px; font-weight: 600;
      pointer-events: none; z-index: 2;
    }

    /* ── Upload badge ──────────────────────────────────────────── */
    .upload-badge {
      display: flex; align-items: center; gap: 6px;
      padding: 4px 8px;
      background: var(--bg-surface);
      border: 1px solid var(--border-dim);
      border-radius: 4px;
      font-size: 11px;
      font-family: var(--font-mono);
      min-height: 28px;
    }
    .upload-badge-text {
      color: var(--text-primary);
      cursor: pointer;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .upload-badge-text:hover { text-decoration: underline; }
    .upload-badge-hint {
      color: var(--text-muted);
      font-size: 10px;
      flex-shrink: 0;
    }

    .tree-node-send {
      padding: 4px 8px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 10px;
      font-weight: 600;
      align-self: flex-end;
    }
    .tree-node-send:hover { filter: brightness(1.15); }
    .tree-node-send:disabled { opacity: 0.3; cursor: default; filter: none; }
    .react-flow__handle { width: 6px !important; height: 6px !important; background: var(--text-muted) !important; border: none !important; }
    .react-flow__edge path { stroke: var(--border-visible) !important; }
    .react-flow__edge.quote-edge path {
      stroke: #3b82f6 !important;
      stroke-width: 1.5;
      stroke-dasharray: 6 3;
    }

    /* ── Process badge (collapsed node) ──────────────────────── */
    .tree-node-proc-badge {
      font-size: 9px;
      font-weight: 600;
      color: var(--accent);
      background: rgba(99, 102, 241, 0.1);
      padding: 1px 5px;
      border-radius: 8px;
      margin-left: 4px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* ── Process list (expanded node) ────────────────────────── */
    .node-processes {
      margin-top: 6px;
      padding-top: 6px;
      border-top: 1px solid var(--border-dim);
      font-size: 11px;
    }
    .node-processes-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px;
      color: var(--text-muted);
      font-weight: 600;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .node-processes-actions {
      display: flex;
      gap: 4px;
    }
    .node-process-action {
      background: none;
      border: 1px solid var(--border-dim);
      color: var(--text-muted);
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.1s;
    }
    .node-process-action:hover {
      color: var(--text-primary);
      border-color: var(--border-visible);
      background: var(--bg-hover);
    }
    .node-process-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 3px 0;
      min-width: 0;
    }
    .node-process-cmd {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--text-secondary);
      font-family: var(--font-mono);
      font-size: 10px;
    }
    .node-process-ports {
      display: flex;
      gap: 3px;
      flex-shrink: 0;
    }
    .node-process-port {
      font-size: 9px;
      font-weight: 600;
      color: var(--accent);
      background: rgba(99, 102, 241, 0.1);
      padding: 0 4px;
      border-radius: 3px;
    }
    .node-process-kill {
      width: 18px;
      height: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      border-radius: 3px;
      font-size: 14px;
      flex-shrink: 0;
      transition: all 0.1s;
    }
    .node-process-kill:hover {
      color: var(--red);
      background: var(--red-dim);
    }

    /* ── Quote button & chips ──────────────────────────────────── */
    .quote-btn {
      position: absolute;
      top: 4px; right: 4px;
      z-index: 5;
      padding: 2px 8px;
      font-size: 10px;
      font-weight: 600;
      background: rgba(59, 130, 246, 0.08);
      color: #3b82f6;
      border: 1px solid rgba(59, 130, 246, 0.25);
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.15s;
      opacity: 0;
    }
    .tree-node:hover .quote-btn,
    .quote-btn.quoted {
      opacity: 1;
    }
    .quote-btn:hover {
      background: rgba(59, 130, 246, 0.15);
      border-color: rgba(59, 130, 246, 0.4);
    }
    .quote-btn.quoted {
      background: rgba(59, 130, 246, 0.15);
      border-color: #3b82f6;
    }
    .quote-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 3px;
      margin-bottom: 4px;
      width: 100%;
    }
    .quote-chip {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 1px 6px;
      font-size: 10px;
      font-weight: 500;
      background: rgba(59, 130, 246, 0.08);
      color: #3b82f6;
      border: 1px solid rgba(59, 130, 246, 0.2);
      border-radius: 4px;
      max-width: 140px;
    }
    .quote-chip-label {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .quote-chip-remove {
      background: none;
      border: none;
      color: #3b82f6;
      cursor: pointer;
      font-size: 12px;
      line-height: 1;
      padding: 0 1px;
      opacity: 0.6;
      transition: opacity 0.1s;
    }
    .quote-chip-remove:hover { opacity: 1; }
    /* ── File attachment chips ──────────────────────────────────── */
    .file-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 3px;
      margin-bottom: 4px;
      width: 100%;
      align-items: center;
    }
    .file-chip {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 2px 6px;
      font-size: 10px;
      font-weight: 500;
      background: rgba(34, 197, 94, 0.08);
      color: #22c55e;
      border: 1px solid rgba(34, 197, 94, 0.2);
      border-radius: 4px;
      max-width: 160px;
    }
    .file-chip-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .file-chip-remove {
      background: none;
      border: none;
      color: #22c55e;
      cursor: pointer;
      font-size: 12px;
      line-height: 1;
      padding: 0 1px;
      opacity: 0.6;
      transition: opacity 0.1s;
    }
    .file-chip-remove:hover { opacity: 1; }
    .file-chips-size {
      font-size: 9px;
      color: var(--text-muted);
      margin-left: 2px;
    }

    /* ── Attach button ─────────────────────────────────────────── */
    .attach-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: color 0.15s, background 0.15s;
    }
    .attach-btn:hover {
      color: var(--text-primary);
      background: var(--bg-tertiary);
    }

    /* ── Input wrap for attach button positioning ──────────────── */
    .tree-node-input-wrap {
      display: flex;
      gap: 4px;
      margin-top: 4px;
      width: 100%;
      position: relative;
      align-items: flex-end;
    }
    /* ── Drag-over & drop overlay ──────────────────────────────── */
    .drag-over {
      outline: 2px dashed rgba(34, 197, 94, 0.5);
      outline-offset: -2px;
      border-radius: 6px;
    }
    .drop-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(34, 197, 94, 0.08);
      color: #22c55e;
      font-size: 11px;
      font-weight: 600;
      border-radius: 6px;
      pointer-events: none;
      z-index: 5;
    }

    /* ── Zoom controls ─────────────────────────────────────────── */
    .zoom-controls {
      position: absolute; bottom: 12px; right: 12px; z-index: 5;
      display: flex; gap: 2px;
      background: var(--bg-surface);
      border: 1px solid var(--border-dim);
      border-radius: 10px;
      padding: 2px;
      box-shadow: var(--shadow-md);
    }
    .zoom-controls button {
      width: 30px; height: 30px;
      background: transparent; border: none;
      border-radius: 8px; cursor: pointer;
      color: var(--text-secondary); font-size: 14px; font-weight: 600;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.1s;
    }
    .zoom-controls button:hover {
      background: var(--bg-hover); color: var(--text-primary);
    }
    .zoom-controls .has-tooltip > .tooltip {
      top: auto;
      bottom: calc(100% + 6px);
    }

    /* ── Sticky note ───────────────────────────────────────────── */
    .sticky-note {
      width: 100%;
      height: 100%;
      min-height: 80px;
      background: #fef9c3;
      border: 1px solid #e5d990;
      border-radius: 4px;
      box-shadow: 2px 2px 8px rgba(0,0,0,0.12);
      display: flex;
      flex-direction: column;
    }
    .sticky-note-drag-handle {
      height: 22px;
      background: #f5e678;
      border-radius: 3px 3px 0 0;
      cursor: grab;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 3px;
      padding: 0 4px;
    }
    .sticky-note-drag-handle:active { cursor: grabbing; }
    .note-quote-btn { font-size: 9px; padding: 1px 6px; line-height: 14px; border: 1px solid rgba(0,0,0,0.15); border-radius: 3px; cursor: pointer; background: #fffde0; color: #555; font-weight: 600; }
    .note-quote-btn:hover { background: #fff8b0; border-color: rgba(0,0,0,0.25); }
    .note-quote-btn.quoted { background: #3b82f6; color: #fff; border-color: #2563eb; }
    .note-action-btn { font-size: 11px; padding: 0 4px; line-height: 14px; border: 1px solid rgba(0,0,0,0.12); border-radius: 3px; cursor: pointer; background: #fffde0; color: #666; }
    .note-action-btn:hover { background: #fff8b0; }
    .sticky-note-locked { opacity: 0.7; }
    .sticky-note-locked .sticky-note-input { color: #999; cursor: default; }
    .sticky-note-input {
      flex: 1;
      width: 100%;
      min-height: 80px;
      padding: 6px 8px;
      font-size: 11px;
      font-family: var(--font-sans);
      line-height: 1.45;
      background: transparent;
      color: #1a1a1e;
      border: none;
      outline: none;
      resize: none;
      overflow: auto;
    }
    .sticky-note-input::placeholder { color: #b0a860; }
    [data-theme="dark"] .sticky-note {
      background: #3d3a20;
      border-color: #5a5530;
    }
    [data-theme="dark"] .sticky-note-drag-handle { background: #4a4620; }
    [data-theme="dark"] .note-quote-btn { background: #4a4620; color: #ccc; border-color: #5a5530; }
    [data-theme="dark"] .note-quote-btn:hover { background: #5a5520; }
    [data-theme="dark"] .note-action-btn { background: #4a4620; color: #aaa; border-color: #5a5530; }
    [data-theme="dark"] .note-action-btn:hover { background: #5a5520; }
    [data-theme="dark"] .sticky-note-locked .sticky-note-input { color: #777; }
    [data-theme="dark"] .sticky-note-input { color: #f8f8f2; }
    [data-theme="dark"] .sticky-note-input::placeholder { color: #6a6530; }
    .sticky-note-resize-ctrl { background: transparent !important; border: none !important; width: 12px !important; height: 12px !important; right: 0 !important; bottom: 0 !important; cursor: se-resize; }
    .sticky-note-resize-ctrl::after { content: ""; position: absolute; right: 2px; bottom: 2px; width: 6px; height: 6px; border-right: 2px solid #c4b84a; border-bottom: 2px solid #c4b84a; opacity: 0; transition: opacity 0.15s; }
    .sticky-note-resize-ctrl:hover::after { opacity: 1; }
    [data-theme="dark"] .sticky-note-resize-ctrl::after { border-color: #6a6530; }

    .branch-btn {
      padding: 3px 10px; font-size: 11px;
      border: 1px solid var(--border-visible);
      background: transparent; border-radius: var(--radius-sm);
      cursor: pointer; color: var(--text-secondary);
      transition: all 0.15s;
    }
    .branch-btn:hover { background: var(--accent-dim); border-color: var(--accent); color: var(--text-primary); }

    /* ── Messages ───────────────────────────────────────────────── */
    .msg { max-width: 90%; font-size: 13px; line-height: 1.55; animation: msg-in 200ms ease-out; }
    .msg.user { align-self: flex-end; }
    .msg.assistant { align-self: flex-start; width: 100%; }

    .msg-role {
      font-size: 10px; margin-bottom: 3px; font-weight: 600;
      display: flex; align-items: center; gap: 4px;
    }
    .msg.user .msg-role { color: var(--text-muted); justify-content: flex-end; }
    .msg.assistant .msg-role { color: var(--accent); }
    .msg-from { color: var(--text-dim); font-weight: 400; font-size: 10px; }

    .msg.user .msg-text {
      background: var(--bg-raised); padding: 8px 12px;
      border-radius: 10px 10px 2px 10px;
      color: var(--text-primary);
      box-shadow: var(--shadow-sm);
      white-space: pre-wrap; word-break: break-word;
    }

    .msg.assistant .msg-text {
      padding: 4px 0; color: var(--text-secondary);
      white-space: normal; word-break: break-word;
    }

    /* ── Markdown inside bot messages ───────────────────────────── */
    .msg.assistant .msg-text p { margin: 0 0 8px 0; }
    .msg.assistant .msg-text p:last-child { margin-bottom: 0; }
    .msg.assistant .msg-text code {
      padding: 2px 6px; background: var(--bg-raised); border-radius: 4px;
      font-family: var(--font-mono); font-size: 12px;
      border: 1px solid var(--border-subtle);
    }
    .msg.assistant .msg-text pre {
      background: var(--bg-surface); padding: 12px 14px; border-radius: var(--radius-sm);
      overflow-x: auto; margin: 8px 0; border: 1px solid var(--border-dim);
      box-shadow: inset 0 1px 3px rgba(0,0,0,0.04);
    }
    .msg.assistant .msg-text pre code {
      padding: 0; background: none; border: none; font-size: 12px; line-height: 1.5;
    }
    .msg.assistant .msg-text blockquote {
      border-left: 3px solid var(--accent-dim); padding-left: 14px;
      color: var(--text-muted); margin: 8px 0;
    }
    .msg.assistant .msg-text ul, .msg.assistant .msg-text ol { padding-left: 20px; margin: 4px 0 8px; }
    .msg.assistant .msg-text h1, .msg.assistant .msg-text h2, .msg.assistant .msg-text h3 {
      color: var(--text-primary); margin: 12px 0 6px 0;
    }
    .msg.assistant .msg-text h1 { font-size: 16px; }
    .msg.assistant .msg-text h2 { font-size: 14px; }
    .msg.assistant .msg-text h3 { font-size: 13px; }
    .msg.assistant .msg-text a { color: var(--accent); text-decoration: underline; }
    .msg.assistant .msg-text a:hover { text-decoration: none; }
    .msg.assistant .msg-text table { border-collapse: collapse; margin: 8px 0; width: 100%; }
    .msg.assistant .msg-text th, .msg.assistant .msg-text td {
      padding: 4px 10px; border: 1px solid var(--border-dim); font-size: 12px;
    }
    .msg.assistant .msg-text th { background: var(--bg-raised); color: var(--text-primary); font-weight: 600; }
    .msg.assistant .msg-text img { max-width: 100%; border-radius: 4px; }
    .msg.assistant .msg-text hr { border: none; border-top: 1px solid var(--border-dim); margin: 12px 0; }

    /* ── Tool calls (adapted from WhatTheBot) ──────────────────── */
    .tool-calls-block {
      display: flex; flex-direction: column; gap: 2px;
      padding: 4px 0; animation: msg-in 200ms ease-out;
    }

    .tool-calls-summary {
      background: none; border: none; cursor: pointer;
      font-family: var(--font-mono); font-size: 11px;
      color: var(--text-muted); text-align: left;
      padding: 3px 0 3px 10px; border-left: 2px solid var(--text-dim);
    }
    .tool-calls-summary:hover { color: var(--text-secondary); }

    .tool-line {
      display: flex; align-items: center; gap: 6px;
      font-family: var(--font-mono); font-size: 11px;
      padding: 3px 0 3px 10px; border-left: 2px solid var(--text-muted);
      flex-wrap: wrap;
    }
    .tool-line.terminal { border-left-color: var(--green); }
    .tool-line.file     { border-left-color: var(--accent); }
    .tool-line.search   { border-left-color: var(--amber); }
    .tool-line.running  { border-left-color: var(--amber); }
    .tool-line.error    { border-left-color: var(--red); }

    .tool-line-label {
      font-size: 10px; color: var(--text-muted); min-width: 32px;
      font-weight: 600; text-transform: uppercase;
    }
    .tool-line.terminal .tool-line-label { color: var(--green); min-width: auto; }

    .tool-line-value {
      flex: 1; color: var(--text-secondary);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      min-width: 0;
    }
    .tool-line.terminal .tool-line-value { color: var(--green); }
    .tool-line.error .tool-line-value { color: var(--text-muted); }

    .tool-line-status {
      font-size: 11px; font-weight: 600; flex-shrink: 0;
    }
    .tool-line-status.done    { color: var(--green); }
    .tool-line-status.error   { color: var(--red); }
    .tool-line-status.running { color: var(--amber); animation: spin-icon 1s linear infinite; display: inline-block; }

    @keyframes spin-icon {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .tool-line-details {
      width: 100%; padding-left: 10px;
    }
    .tool-line-toggle {
      font-size: 10px; font-family: var(--font-mono); color: var(--text-dim);
      background: none; border: none; cursor: pointer; padding: 2px 0;
    }
    .tool-line-toggle:hover { color: var(--text-secondary); }
    .tool-line-body {
      font-family: var(--font-mono); font-size: 11px;
      padding: 6px 10px; margin: 2px 0;
      background: var(--bg-surface); border: 1px solid var(--border-dim);
      border-radius: 4px; max-height: 200px; overflow-y: auto;
      white-space: pre-wrap; word-break: break-all;
      color: var(--text-secondary);
    }
    .tool-line-body.error { color: var(--red); border-color: rgba(220,38,38,0.2); }

    .tool-generic {
      font-family: var(--font-mono); font-size: 11px;
      border-left: 2px solid var(--text-muted); padding-left: 10px;
      margin: 2px 0;
    }
    .tool-generic.running { border-left-color: var(--amber); }
    .tool-generic.done    { border-left-color: var(--text-muted); }
    .tool-generic.error   { border-left-color: var(--red); }

    .tool-generic-summary {
      cursor: pointer; display: flex; align-items: center; gap: 6px;
      padding: 2px 0; list-style: none;
    }
    .tool-generic-summary::-webkit-details-marker { display: none; }

    .tool-generic-name { color: var(--text-primary); font-weight: 600; }
    .tool-generic-args {
      color: var(--text-dim); flex: 1; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap;
    }
    .tool-generic-body {
      font-family: var(--font-mono); font-size: 11px;
      padding: 6px 10px; margin: 4px 0;
      background: var(--bg-surface); border: 1px solid var(--border-dim);
      border-radius: 4px; max-height: 200px; overflow-y: auto;
      white-space: pre-wrap; word-break: break-all;
      color: var(--text-secondary);
    }
    .tool-generic-body.error { color: var(--red); border-color: rgba(220,38,38,0.2); }

    /* ── Streaming dots ─────────────────────────────────────────── */
    .stream-dots {
      font-size: 18px; letter-spacing: 3px; color: var(--text-muted);
      animation: dots-pulse 1.4s infinite;
      padding: 4px 0;
    }

    /* ── Animations ─────────────────────────────────────────────── */
    @keyframes msg-in {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    @keyframes dots-pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }

    /* ── Clickable assistant response in tree node ──────────────── */
    .tree-node-assistant.clickable {
      cursor: pointer;
      border-radius: 4px;
      transition: background 0.15s, border-color 0.15s;
    }
    .tree-node-assistant.clickable:hover {
      background: var(--bg-active);
      border-left-color: var(--accent);
    }

    /* ── Markdown inside tree node ─────────────────────────────── */
    .tree-node-response-md { font-size: 11px; line-height: 1.5; }
    .tree-node-response-md p { margin: 0 0 6px 0; }
    .tree-node-response-md p:last-child { margin-bottom: 0; }
    .tree-node-response-md code {
      padding: 1px 4px; background: var(--bg-active); border-radius: 3px;
      font-family: var(--font-mono); font-size: 10px;
      border: 1px solid var(--border-subtle);
    }
    .tree-node-response-md pre {
      background: var(--bg-deep); padding: 8px 10px;
      border-radius: 4px; overflow-x: auto;
      margin: 4px 0; border: 1px solid var(--border-dim);
    }
    .tree-node-response-md pre code {
      padding: 0; background: none; border: none; font-size: 10px; line-height: 1.4;
    }
    .tree-node-response-md blockquote {
      border-left: 2px solid var(--accent-dim); padding-left: 8px;
      color: var(--text-muted); margin: 4px 0;
    }
    .tree-node-response-md ul, .tree-node-response-md ol { padding-left: 16px; margin: 4px 0; }
    .tree-node-response-md h1, .tree-node-response-md h2, .tree-node-response-md h3 {
      color: var(--text-primary); margin: 8px 0 4px 0;
    }
    .tree-node-response-md h1 { font-size: 14px; }
    .tree-node-response-md h2 { font-size: 13px; }
    .tree-node-response-md h3 { font-size: 12px; }
    .tree-node-response-md a { color: var(--accent); text-decoration: underline; }
    .tree-node-response-md a:hover { text-decoration: none; }
    .tree-node-response-md table { border-collapse: collapse; margin: 4px 0; width: 100%; }
    .tree-node-response-md th, .tree-node-response-md td {
      padding: 3px 8px; border: 1px solid var(--border-dim); font-size: 10px;
    }
    .tree-node-response-md th { background: var(--bg-raised); color: var(--text-primary); font-weight: 600; }
    .tree-node-response-md img { max-width: 100%; border-radius: 3px; }
    .tree-node-response-md video { max-width: 100%; border-radius: 3px; margin: 4px 0; }
    .tree-node-response-md .video-embed { position: relative; padding-bottom: 56.25%; height: 0; margin: 4px 0; border-radius: 3px; overflow: hidden; }
    .tree-node-response-md .video-embed iframe { position: absolute; inset: 0; width: 100%; height: 100%; }
    .tree-node-response-md hr { border: none; border-top: 1px solid var(--border-dim); margin: 8px 0; }

    /* ── Node response modal ─────────────────────────────────────── */
    .node-modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(0,0,0,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: modal-fade-in 150ms ease-out;
    }
    @keyframes modal-fade-in {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .node-modal {
      position: relative;
      background: var(--bg-surface);
      border: 1px solid var(--border-visible);
      border-radius: var(--radius-md);
      width: 90vw; max-width: 720px;
      max-height: 80vh;
      overflow-y: auto;
      padding: 24px 28px;
      box-shadow: var(--shadow-lg);
    }
    .node-modal-close {
      position: absolute; top: 10px; right: 14px;
      background: none; border: none; color: var(--text-muted);
      font-size: 22px; cursor: pointer; line-height: 1;
    }
    .node-modal-close:hover { color: var(--text-primary); }
    .node-modal-user {
      background: var(--bg-active);
      padding: 8px 12px; border-radius: var(--radius-sm);
      color: var(--text-primary); font-size: 13px;
      margin-bottom: 16px; white-space: pre-wrap; word-break: break-word;
    }
    .node-modal-response {
      color: var(--text-secondary);
      font-size: 14px; line-height: 1.7;
    }
    .node-modal-response p { margin: 0 0 10px 0; }
    .node-modal-response p:last-child { margin-bottom: 0; }
    .node-modal-response code {
      padding: 2px 6px; background: var(--bg-raised); border-radius: 4px;
      font-family: var(--font-mono); font-size: 13px;
      border: 1px solid var(--border-subtle);
    }
    .node-modal-response pre {
      background: var(--bg-deep); padding: 14px 16px;
      border-radius: var(--radius-sm); overflow-x: auto;
      margin: 10px 0; border: 1px solid var(--border-dim);
    }
    .node-modal-response pre code {
      padding: 0; background: none; border: none; font-size: 13px; line-height: 1.5;
    }
    .node-modal-response blockquote {
      border-left: 3px solid var(--accent-dim); padding-left: 14px;
      color: var(--text-muted); margin: 10px 0;
    }
    .node-modal-response ul, .node-modal-response ol { padding-left: 22px; margin: 6px 0 10px; }
    .node-modal-response h1, .node-modal-response h2, .node-modal-response h3 {
      color: var(--text-primary); margin: 16px 0 8px 0;
    }
    .node-modal-response h1 { font-size: 18px; }
    .node-modal-response h2 { font-size: 16px; }
    .node-modal-response h3 { font-size: 14px; }
    .node-modal-response a { color: var(--accent); text-decoration: underline; }
    .node-modal-response a:hover { text-decoration: none; }
    .node-modal-response table { border-collapse: collapse; margin: 10px 0; width: 100%; }
    .node-modal-response th, .node-modal-response td {
      padding: 6px 12px; border: 1px solid var(--border-dim); font-size: 13px;
    }
    .node-modal-response th { background: var(--bg-raised); color: var(--text-primary); font-weight: 600; }
    .node-modal-response img { max-width: 100%; border-radius: 4px; }
    .node-modal-response video { max-width: 100%; border-radius: 4px; margin: 10px 0; }
    .node-modal-response .video-embed { position: relative; padding-bottom: 56.25%; height: 0; margin: 10px 0; border-radius: 4px; overflow: hidden; }
    .node-modal-response .video-embed iframe { position: absolute; inset: 0; width: 100%; height: 100%; }
    .node-modal-response hr { border: none; border-top: 1px solid var(--border-dim); margin: 14px 0; }

    /* Keep text selection visible in modal */
    .node-modal-response ::selection { background: rgba(58, 58, 66, 0.3); }

    /* Selection quote button */
    .selection-quote-btn {
      position: fixed;
      transform: translate(-50%, -100%);
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      padding: 3px 10px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      z-index: 10001;
      box-shadow: var(--shadow-md);
      line-height: 1.4;
    }
    .selection-quote-btn:hover { background: #505060; }

    /* ── Quote Browser modal ─────────────────────────────────── */
    .qb-overlay {
      position: fixed; inset: 0; z-index: 9999;
      background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center;
    }
    .qb-modal {
      background: var(--bg-base); border: 1px solid var(--border-dim); border-radius: var(--radius-md);
      width: 700px; max-width: 92vw; max-height: 80vh; display: flex; flex-direction: column;
      box-shadow: var(--shadow-lg);
    }
    .qb-header {
      display: flex; align-items: center; gap: 10px; padding: 10px 14px;
      border-bottom: 1px solid var(--border-dim);
    }
    .qb-tabs { display: flex; gap: 4px; }
    .qb-tab {
      background: none; border: 1px solid var(--border-dim); border-radius: var(--radius-sm);
      color: var(--text-muted); padding: 3px 12px; cursor: pointer; font-size: 12px;
    }
    .qb-tab.active { background: var(--bg-raised); color: var(--text-primary); border-color: var(--border-visible); }
    .qb-title { flex: 1; font-size: 12px; color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .qb-close {
      background: none; border: none; color: var(--text-muted); font-size: 20px;
      cursor: pointer; padding: 0 4px; line-height: 1;
    }
    .qb-close:hover { color: var(--text-primary); }
    .qb-body { flex: 1; overflow-y: auto; min-height: 200px; }
    .qb-files { padding: 6px 0; }
    .qb-item {
      display: flex; align-items: center; gap: 6px; padding: 3px 8px;
      font-size: 12px; color: var(--text-primary); font-family: var(--font-mono);
    }
    .qb-item:hover { background: var(--bg-hover); }
    .qb-item-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .qb-add-btn {
      background: var(--accent); border: none; border-radius: var(--radius-sm);
      color: #fff; padding: 2px 8px; cursor: pointer;
      font-size: 11px; font-weight: 600; flex-shrink: 0;
    }
    .qb-add-btn:hover { background: #505060; }
    .qb-diff { padding: 8px; }
    .qb-diff-text {
      font-size: 11px; font-family: var(--font-mono); line-height: 1.5;
      white-space: pre-wrap; word-break: break-all; margin: 0;
      color: var(--text-secondary); user-select: text;
    }
    .qb-diff-text ::selection { background: rgba(58, 58, 66, 0.3); }
    .qb-line-add { color: #4ade80; }
    .qb-line-del { color: #f87171; }
    .qb-line-hunk { color: #60a5fa; }
    .qb-quoted {
      display: flex; flex-wrap: wrap; gap: 4px; padding: 8px 12px;
      border-top: 1px solid var(--border-dim);
    }
    .qb-placeholder { padding: 24px; text-align: center; color: var(--text-muted); font-size: 13px; }
    .qb-hint { padding: 6px 12px; font-size: 11px; color: var(--text-muted); border-bottom: 1px solid var(--border-dim); }

    /* KaTeX overrides for dark theme */
    .katex { color: var(--text-primary); }
    .katex-display { margin: 12px 0; overflow-x: auto; }

    /* ── Branch info section (root node) ──────────────────────── */
    .branch-info-path {
      font-size: 9px; color: var(--text-dim);
      font-family: var(--font-mono);
      padding: 1px 2px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      direction: rtl; text-align: left;  /* show tail of long paths */
    }
    .branch-info-path.editable {
      cursor: pointer; border-radius: 3px;
      padding: 2px 4px;
      border: 1px dashed transparent;
      transition: border-color 0.15s, color 0.15s;
    }
    .branch-info-path.editable:hover {
      border-color: var(--border-dim);
      color: var(--text-secondary);
    }
    .branch-path-input {
      font-size: 9px; font-family: var(--font-mono);
      padding: 2px 6px; border-radius: 3px;
      background: var(--bg-surface); color: var(--text-primary);
      border: 1px solid var(--accent);
      box-shadow: 0 0 0 2px var(--accent-glow);
      outline: none; width: 100%;
    }
    .branch-info-row {
      display: flex; align-items: center; gap: 6px;
      padding: 2px 0;
    }
    .branch-info-compact { padding: 0; margin-bottom: 4px; }
    .branch-info-name {
      font-size: 11px; font-weight: 600;
      font-family: var(--font-mono);
      color: var(--accent);
      padding: 2px 8px;
      background: var(--accent-dim);
      border-radius: 4px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .branch-info-sha {
      font-size: 10px; font-family: var(--font-mono);
      color: var(--text-muted);
      cursor: pointer; user-select: all;
      padding: 1px 4px; border-radius: 3px;
      transition: color 0.15s, background 0.15s;
    }
    .branch-info-sha:hover {
      color: var(--text-primary);
      background: var(--bg-hover);
    }
    .branch-info-sha.editable {
      border: 1px dashed var(--border-dim);
      cursor: pointer;
    }
    .branch-info-sha.editable:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    .commit-input {
      font-size: 10px; font-family: var(--font-mono);
      padding: 1px 6px; border-radius: 3px;
      background: var(--bg-surface); color: var(--text-primary);
      border: 1px solid var(--accent);
      box-shadow: 0 0 0 2px var(--accent-glow);
      outline: none; width: 100px;
    }
    .branch-select {
      font-size: 11px; padding: 2px 6px;
      font-family: var(--font-mono);
      background: var(--bg-surface); color: var(--accent);
      border: 1px solid var(--border-dim); border-radius: 4px;
      outline: none; cursor: pointer;
      max-width: 160px;
    }
    .branch-select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent-glow);
    }
    .root-section-locked .branch-info-path { opacity: 0.5; }
    .root-section-locked .branch-info-name { opacity: 0.5; }
    .root-section-locked .branch-info-sha { opacity: 0.5; cursor: default; }

    .root-input-hint {
      font-size: 9px; color: var(--text-muted); padding: 1px 2px;
      font-family: var(--font-sans);
    }
    .repo-badge {
      display: flex; align-items: center; gap: 4px;
      font-size: 10px; padding: 2px 6px 2px 8px;
      background: var(--accent-dim); color: var(--accent);
      border-radius: 4px; border: 1px solid rgba(0,0,0,0.08);
      width: 100%; margin-bottom: 4px;
      font-family: var(--font-mono);
    }
    .repo-badge-text {
      flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .repo-badge-copy {
      background: none; border: none; color: var(--accent);
      cursor: pointer; font-size: 9px; font-family: var(--font-mono);
      padding: 1px 4px; border-radius: 3px; flex-shrink: 0;
      opacity: 0.6; transition: opacity 0.15s;
    }
    .repo-badge-copy:hover { opacity: 1; background: rgba(0,0,0,0.06); }
    .repo-badge-browsable { cursor: pointer; transition: color 0.15s; }
    .repo-badge-browsable:hover { color: var(--text-primary); text-decoration: underline; }

    /* ── Action buttons on tree nodes ──────────────────────────── */
    .tree-node-actions {
      display: flex; gap: 4px; flex-wrap: wrap; margin-top: 2px;
    }
    .tree-node-action-btn {
      padding: 2px 8px; font-size: 10px; font-weight: 600;
      background: transparent; color: var(--text-muted);
      border: 1px solid var(--border-dim); border-radius: 4px;
      cursor: pointer; transition: all 0.15s;
    }
    .tree-node-action-btn:hover {
      background: var(--accent-dim); border-color: var(--accent); color: var(--text-primary);
    }
    .tree-node-action-btn.files-btn {
      color: var(--green, #16a34a); border-color: rgba(22,163,74,0.3);
    }
    .tree-node-action-btn.files-btn:hover {
      background: rgba(22,163,74,0.1); border-color: var(--green, #16a34a); color: var(--green, #16a34a);
    }
    .tree-node-action-btn.cancel {
      color: var(--red, #dc2626); border-color: rgba(220,38,38,0.3);
      align-self: flex-start; margin-top: 2px;
    }
    .tree-node-action-btn.cancel:hover {
      background: rgba(220,38,38,0.1); border-color: var(--red, #dc2626); color: var(--red, #dc2626);
    }

    /* ── File browser modal ──────────────────────────────────────── */
    .filebrowser-overlay {
      position: fixed; inset: 0; z-index: 1000;
      background: rgba(0,0,0,0.3);
      display: flex; align-items: center; justify-content: center;
      animation: overlay-in 0.15s ease-out;
    }
    .filebrowser {
      position: relative;
      background: var(--bg-surface);
      border: 1px solid var(--border-visible);
      border-radius: var(--radius-md);
      width: 92vw; max-width: 1100px;
      height: 80vh;
      display: flex; flex-direction: column;
      box-shadow: var(--shadow-lg);
      animation: panel-in 0.2s ease-out;
      overflow: hidden;
    }
    .filebrowser-header {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border-dim);
      flex-shrink: 0;
    }
    .filebrowser-tabs { display: flex; gap: 2px; }
    .filebrowser-tab {
      padding: 4px 14px; font-size: 12px; font-weight: 500;
      border: 1px solid var(--border-visible);
      background: transparent; border-radius: var(--radius-sm);
      cursor: pointer; color: var(--text-secondary);
      transition: all 0.15s;
    }
    .filebrowser-tab:hover { background: var(--bg-hover); }
    .filebrowser-tab.active {
      background: var(--accent-dim); border-color: var(--accent); color: var(--text-primary);
    }
    .filebrowser-title {
      flex: 1; font-size: 13px; font-weight: 600;
      color: var(--text-primary);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .filebrowser-close {
      background: none; border: none; color: var(--text-muted);
      font-size: 22px; cursor: pointer; line-height: 1;
      padding: 0 4px;
    }
    .filebrowser-close:hover { color: var(--text-primary); }

    .filebrowser-body {
      flex: 1; display: flex; overflow: hidden;
    }

    /* Sidebar file tree */
    .filebrowser-sidebar {
      width: 240px; min-width: 180px; max-width: 320px;
      border-right: 1px solid var(--border-dim);
      overflow-y: auto; overflow-x: hidden;
      padding: 4px 0;
      flex-shrink: 0;
    }
    .filebrowser-dir {
      padding: 3px 8px;
      font-size: 11px; font-weight: 600;
      color: var(--text-muted);
      font-family: var(--font-mono);
      user-select: none;
      display: flex; align-items: center; gap: 4px;
      cursor: pointer;
    }
    .filebrowser-dir:hover { background: var(--bg-hover); }
    .filebrowser-dir-arrow { font-size: 10px; width: 10px; flex-shrink: 0; }
    .filebrowser-dir-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .filebrowser-file {
      padding: 4px 8px;
      font-size: 12px; cursor: pointer;
      font-family: var(--font-mono);
      color: var(--text-secondary);
      transition: background 0.1s;
      white-space: nowrap;
      display: flex; align-items: center; gap: 4px;
    }
    .filebrowser-file:hover { background: var(--bg-hover); color: var(--text-primary); }
    .filebrowser-file.active {
      background: var(--accent-dim); color: var(--text-primary);
    }
    .filebrowser-file-icon { font-size: 11px; flex-shrink: 0; }
    .filebrowser-file-name { flex: 1; overflow: hidden; text-overflow: ellipsis; }

    /* Download buttons */
    .filebrowser-dl-btn {
      display: none; flex-shrink: 0;
      padding: 2px; border-radius: 3px;
      color: var(--text-dim);
      transition: color 0.1s, background 0.1s;
      line-height: 0;
    }
    .filebrowser-dl-btn:hover { color: var(--accent); background: var(--accent-dim); }
    .filebrowser-file:hover .filebrowser-dl-btn,
    .filebrowser-dir:hover > .filebrowser-dl-btn { display: flex; }

    /* Quote buttons in file tree */
    .filebrowser-quote-btn {
      display: none; flex-shrink: 0;
      padding: 1px 6px; border-radius: 3px;
      font-size: 10px; font-weight: 600;
      background: var(--accent); color: #fff;
      border: none; cursor: pointer;
      line-height: 1.4;
    }
    .filebrowser-quote-btn:hover { background: #505060; }
    .filebrowser-file:hover .filebrowser-quote-btn,
    .filebrowser-dir:hover > .filebrowser-quote-btn { display: block; }

    /* Diff hint */
    .diff-hint {
      font-size: 11px; color: var(--text-dim);
      padding: 4px 12px; font-style: italic;
    }

    .filebrowser-dl-all {
      display: flex; align-items: center; gap: 4px;
      padding: 4px 10px; font-size: 11px; font-weight: 500;
      color: var(--text-secondary); text-decoration: none;
      border: 1px solid var(--border-visible); border-radius: var(--radius-sm);
      transition: all 0.15s; flex-shrink: 0;
    }
    .filebrowser-dl-all:hover { background: var(--bg-hover); color: var(--text-primary); }

    /* Content area */
    .filebrowser-content {
      flex: 1; overflow: auto; display: flex; flex-direction: column;
      min-width: 0;
    }
    .filebrowser-filepath {
      padding: 6px 16px;
      font-size: 11px; font-family: var(--font-mono);
      color: var(--text-muted);
      border-bottom: 1px solid var(--border-subtle);
      flex-shrink: 0;
      display: flex; align-items: center; gap: 8px;
    }
    .filebrowser-filepath > span {
      flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .filebrowser-filepath-dl {
      flex-shrink: 0; color: var(--text-dim); line-height: 0;
      padding: 2px; border-radius: 3px;
      transition: color 0.1s, background 0.1s;
    }
    .filebrowser-filepath-dl:hover { color: var(--accent); background: var(--accent-dim); }
    .filebrowser-placeholder {
      flex: 1; display: flex; align-items: center; justify-content: center;
      color: var(--text-muted); font-size: 13px;
    }

    /* Code viewer with line numbers */
    .filebrowser-code-wrap { flex: 1; overflow: auto; }
    .filebrowser-code {
      margin: 0; padding: 8px 0;
      font-family: var(--font-mono); font-size: 12px; line-height: 1.6;
      background: var(--bg-deep);
      counter-reset: line;
    }
    .filebrowser-code code { background: none; border: none; padding: 0; font-size: inherit; }
    .filebrowser-line { display: block; padding: 0 16px 0 0; }
    .filebrowser-line:hover { background: var(--bg-hover); }
    .filebrowser-ln {
      display: inline-block; width: 48px;
      text-align: right; padding-right: 16px;
      color: var(--text-dim); user-select: none;
      font-size: 11px;
    }

    /* Media viewers */
    .filebrowser-media {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 24px; overflow: auto;
      background: var(--bg-deep);
    }
    .filebrowser-media img {
      max-width: 100%; max-height: 100%;
      object-fit: contain; border-radius: 4px;
      box-shadow: var(--shadow-md);
    }
    .filebrowser-media video {
      max-width: 100%; max-height: 100%;
      border-radius: 4px; box-shadow: var(--shadow-md);
    }
    .filebrowser-audio {
      flex-direction: column; gap: 16px;
    }
    .filebrowser-audio-name {
      font-size: 14px; font-weight: 600; color: var(--text-primary);
    }
    .filebrowser-pdf {
      flex: 1; display: flex;
    }
    .filebrowser-pdf iframe {
      flex: 1; border: none; background: white;
    }

    /* Diff viewer */
    .diff-viewer {
      flex: 1; overflow-y: auto;
      font-family: var(--font-mono); font-size: 12px;
    }
    .diff-summary {
      padding: 8px 16px;
      font-size: 12px; font-weight: 600;
      color: var(--text-secondary);
      border-bottom: 1px solid var(--border-dim);
      background: var(--bg-surface);
      position: sticky; top: 0; z-index: 1;
    }
    .diff-stat-add { color: var(--green); font-weight: 700; }
    .diff-stat-del { color: var(--red); font-weight: 700; margin-left: 4px; }
    .diff-file { border-bottom: 1px solid var(--border-dim); }
    .diff-file-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 16px;
      background: var(--bg-raised);
      border-bottom: 1px solid var(--border-subtle);
      position: sticky; top: 33px; z-index: 1;
    }
    .diff-file-name {
      font-size: 12px; font-weight: 600; color: var(--text-primary);
      flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .diff-file-stats {
      font-size: 11px; display: flex; gap: 6px; align-items: center; flex-shrink: 0; margin-left: 8px;
    }
    .diff-file-body { background: var(--bg-deep); }
    .diff-hunk-block { border-top: 1px solid var(--border-subtle); }
    .diff-hunk-header {
      padding: 4px 16px;
      color: var(--text-muted); font-size: 11px;
      background: rgba(0,0,0,0.02);
      border-bottom: 1px solid var(--border-subtle);
    }
    .diff-line {
      display: flex; line-height: 1.6;
      border-bottom: 1px solid transparent;
    }
    .diff-line:hover { filter: brightness(0.97); }
    .diff-ln {
      display: inline-block; width: 40px; min-width: 40px;
      text-align: right; padding-right: 8px;
      color: var(--text-dim); user-select: none;
      font-size: 11px;
    }
    .diff-indicator {
      display: inline-block; width: 16px; min-width: 16px;
      text-align: center; user-select: none;
      font-weight: 700;
    }
    .diff-text {
      flex: 1; white-space: pre-wrap; word-break: break-all;
      padding-right: 16px;
    }
    .diff-line-add {
      background: rgba(22,163,74,0.07);
    }
    .diff-line-add .diff-indicator { color: var(--green); }
    .diff-line-add .diff-text { color: var(--text-primary); }
    .diff-line-del {
      background: rgba(220,38,38,0.07);
    }
    .diff-line-del .diff-indicator { color: var(--red); }
    .diff-line-del .diff-text { color: var(--text-primary); }
    .diff-line-ctx .diff-text { color: var(--text-secondary); }
    .diff-line-ctx .diff-indicator { color: transparent; }

    /* ── Diff: status badges & binary ──────────────────────────── */
    .diff-file-badge {
      display: inline-block; padding: 1px 6px; border-radius: 3px;
      font-size: 10px; font-weight: 700; letter-spacing: 0.5px;
      margin-right: 8px; flex-shrink: 0;
    }
    .diff-badge-added { background: rgba(22,163,74,0.15); color: var(--green); }
    .diff-badge-deleted { background: rgba(220,38,38,0.15); color: var(--red); }
    .diff-badge-renamed { background: rgba(59,130,246,0.15); color: #3b82f6; }
    .diff-badge-modified { background: rgba(245,158,11,0.15); color: #f59e0b; }
    .diff-badge-mode-change { background: rgba(139,92,246,0.15); color: #8b5cf6; }
    .diff-file-type-icon { margin-right: 6px; font-size: 13px; }
    .diff-rename-arrow { color: var(--text-muted); margin: 0 4px; }
    .diff-stat-sim { color: #3b82f6; font-size: 10px; opacity: 0.7; }
    .diff-stat-bin {
      font-size: 10px; font-weight: 600; color: var(--text-muted);
      background: var(--bg-card); padding: 0 4px; border-radius: 3px;
    }
    .diff-summary-detail { color: var(--text-muted); font-size: 11px; }
    .diff-mode-change {
      padding: 4px 16px; font-size: 11px; color: #8b5cf6;
      background: rgba(139,92,246,0.05); border-bottom: 1px solid var(--border-subtle);
    }
    .diff-binary-body { padding: 16px; background: var(--bg-deep); border-top: 1px solid var(--border-subtle); }
    .diff-binary-preview { display: flex; justify-content: center; align-items: center; }
    .diff-binary-preview img { max-width: 100%; max-height: 400px; border-radius: 6px; border: 1px solid var(--border-dim); }
    .diff-binary-preview video { max-width: 100%; max-height: 400px; border-radius: 6px; }
    .diff-binary-audio { flex-direction: column; gap: 8px; }
    .diff-binary-audio audio { width: 100%; max-width: 400px; }
    .diff-binary-notice {
      text-align: center; padding: 24px 16px;
      color: var(--text-muted); font-size: 13px; font-style: italic;
    }
    .diff-file.diff-file-added { border-left: 3px solid var(--green); }
    .diff-file.diff-file-deleted { border-left: 3px solid var(--red); }
    .diff-file.diff-file-renamed { border-left: 3px solid #3b82f6; }

    /* ── Highlight.js theme (light, minimal) ──────────────────────── */
    .hljs-keyword, .hljs-selector-tag, .hljs-built_in { color: #7c3aed; }
    .hljs-string, .hljs-attr { color: #059669; }
    .hljs-comment, .hljs-quote { color: #9ca3af; font-style: italic; }
    .hljs-number, .hljs-literal { color: #d97706; }
    .hljs-type, .hljs-class .hljs-title, .hljs-title.class_ { color: #2563eb; }
    .hljs-function .hljs-title, .hljs-title.function_ { color: #7c3aed; }
    .hljs-variable, .hljs-template-variable { color: #dc2626; }
    .hljs-meta { color: #6b7280; }
    .hljs-tag { color: #2563eb; }
    .hljs-name { color: #2563eb; }
    .hljs-attribute { color: #d97706; }
    .hljs-symbol, .hljs-bullet { color: #059669; }
    .hljs-params { color: var(--text-secondary); }
    .hljs-regexp { color: #dc2626; }
    .hljs-deletion { color: var(--red); background: var(--red-dim); }
    .hljs-addition { color: var(--green); background: var(--green-dim); }
    .hljs-selector-class, .hljs-selector-id { color: #7c3aed; }
    .hljs-emphasis { font-style: italic; }
    .hljs-strong { font-weight: bold; }

    /* ── Selection highlight ────────────────────────────────────── */
    ::selection { background: rgba(0,0,0,0.10); color: var(--text-primary); }

    /* ── Settings panel ────────────────────────────────────────── */
    @keyframes overlay-in {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes panel-in {
      from { opacity: 0; transform: scale(0.95) translateY(8px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
    .settings-overlay {
      position: fixed; inset: 0; z-index: 1000;
      background: rgba(0,0,0,0.35);
      display: flex; align-items: center; justify-content: center;
      animation: overlay-in 0.15s ease-out;
    }
    .settings-panel {
      background: var(--bg-deep); border: 1px solid var(--border);
      border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.18);
      width: 480px; max-height: 80vh; display: flex; flex-direction: column;
      animation: panel-in 0.2s ease-out;
    }
    .settings-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 20px; border-bottom: 1px solid var(--border-dim);
    }
    .settings-header h2 { margin: 0; font-size: 16px; font-weight: 600; }
    .settings-close-btn {
      background: none; border: none; font-size: 18px; color: var(--text-muted);
      cursor: pointer; padding: 4px 8px; border-radius: 4px;
    }
    .settings-close-btn:hover { background: var(--bg-active); color: var(--text-primary); }
    .settings-body {
      padding: 16px 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px;
    }
    .settings-section {
      display: flex; flex-direction: column; gap: 6px;
      padding-bottom: 16px; border-bottom: 1px solid var(--border-dim);
    }
    .settings-section:last-child { border-bottom: none; padding-bottom: 0; }
    .settings-section-title { margin: 0 0 2px; font-size: 13px; font-weight: 600; color: var(--text-primary); }
    .settings-hint { margin: 0 0 6px; font-size: 11px; color: var(--text-muted); }
    .settings-label { font-size: 11px; font-weight: 600; color: var(--text-secondary); margin-top: 4px; }
    .settings-checkbox-label { display: flex; align-items: center; gap: 6px; margin-top: 8px; cursor: pointer; }
    .settings-checkbox-label input[type="checkbox"] { margin: 0; cursor: pointer; }
    .settings-tag { font-size: 10px; padding: 1px 5px; border-radius: 3px; background: var(--bg-tertiary); color: var(--text-muted); font-weight: 500; }
    .settings-select, .settings-input {
      padding: 6px 8px; font-size: 12px; border: 1px solid var(--border);
      border-radius: 6px; background: var(--bg-main); color: var(--text-primary);
      font-family: inherit;
    }
    .settings-select:focus, .settings-input:focus {
      outline: none; border-color: var(--accent);
    }
    .settings-input[type="password"] { font-family: monospace; letter-spacing: 1px; }
    .settings-save-btn {
      margin-top: 8px; padding: 6px 16px; font-size: 12px; font-weight: 600;
      background: var(--accent); color: white; border: none; border-radius: 6px;
      cursor: pointer; align-self: flex-start; transition: all 0.15s;
    }
    .settings-save-btn:hover { filter: brightness(1.1); }
    .settings-save-btn-small {
      padding: 4px 10px; font-size: 11px; font-weight: 600;
      background: var(--accent); color: white; border: none; border-radius: 4px;
      cursor: pointer; transition: all 0.15s; white-space: nowrap;
    }
    .settings-save-btn-small:hover { filter: brightness(1.1); }

    /* ── Auth status cards ─────────────────────────────────────── */
    .settings-auth-status {
      display: flex; flex-direction: column; gap: 8px;
    }
    .settings-provider-status {
      border: 1px solid var(--border-dim);
      border-radius: 8px;
      padding: 10px 12px;
      background: var(--bg-surface);
    }
    .settings-provider-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 8px;
    }
    .settings-provider-name {
      font-size: 12px; font-weight: 600; color: var(--text-primary);
    }
    .settings-tag-ok {
      background: rgba(40, 167, 69, 0.12); color: #28a745;
    }
    .settings-tag-warn {
      background: rgba(220, 53, 69, 0.12); color: #dc3545;
    }
    .settings-auth-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 4px 0;
      font-size: 11px;
      border-top: 1px solid var(--border-subtle);
    }
    .settings-auth-row:first-of-type { border-top: none; }
