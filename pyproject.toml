[project]
name = "clawtree"
version = "0.1.0"
description = "Tree-structured AI coding assistant with git worktree isolation"
requires-python = ">=3.12"
dependencies = [
    "fastapi",
    "uvicorn[standard]",
    "aiosqlite",
    "anthropic",
    "openai",
    "claude-agent-sdk",
    "pydantic",
]

[dependency-groups]
dev = [
    "pytest",
    "pytest-asyncio",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
pythonpath = ["backend"]
testpaths = ["backend/tests"]
